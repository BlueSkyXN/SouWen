name: External Smoke Gate

run-name: External Smoke Gate (${{ inputs.suite || github.event_name }})

on:
  workflow_call:
    inputs:
      candidate_sha:
        description: "要验证的 40 位候选提交 SHA"
        required: true
        type: string
      suite:
        description: "外部能力 gate 范围"
        required: false
        default: release
        type: string
  workflow_dispatch:
    inputs:
      suite:
        description: "外部能力 gate 范围"
        type: choice
        options:
          - pr-required
          - release
        default: release
  schedule:
    # 02:17 Asia/Shanghai. Nightly failures open or update a tracking issue.
    - cron: "17 18 * * *"
  push:
    tags:
      - "v*"
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "scripts/_functional_common.py"
      - "scripts/scrapling_functional_check.py"
      - "scripts/crawl4ai_functional_check.py"
      - "scripts/article_extract_functional_check.py"
      - "scripts/zero_key_functional_check.py"
      - "pyproject.toml"
      - ".github/workflows/external-smoke-gate.yml"

concurrency:
  group: external-smoke-gate-${{ inputs.candidate_sha || github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  scrapling-gate:
    name: Scrapling release/nightly gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GATE_SUITE: ${{ inputs.suite || (github.event_name == 'pull_request' && 'pr-required') || 'release' }}
    concurrency:
      group: external-smoke-gate-scrapling-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.candidate_sha || github.sha }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cache/ms-playwright
            ~/.cache/scrapling
          key: release-gate-scrapling-${{ runner.os }}-py311-${{ hashFiles('pyproject.toml') }}

      - name: 安装当前源码与 Scrapling 运行时
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,edition-full-scrapling]"
          if [ "$GATE_SUITE" = "release" ]; then
            scrapling install
          else
            echo "Skipping Scrapling browser runtime install for suite=$GATE_SUITE"
          fi

      - name: 运行 Scrapling release/nightly gate
        run: |
          mkdir -p artifacts
          MODE="fixture"
          BROWSER_ARGS=()
          if [ "$GATE_SUITE" = "release" ]; then
            MODE="live"
            BROWSER_ARGS=(--browser)
          fi
          python scripts/scrapling_functional_check.py \
            --mode "$MODE" \
            "${BROWSER_ARGS[@]}" \
            --json-report "artifacts/scrapling-${GATE_SUITE}-gate.json" \
            --markdown-report "artifacts/scrapling-${GATE_SUITE}-gate.md"

      - name: 上传 Scrapling gate 报告
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: external-gate-scrapling-report
          path: artifacts/
          if-no-files-found: warn
          retention-days: 14

  crawl4ai-gate:
    name: Crawl4AI release/nightly gate
    needs: scrapling-gate
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GATE_SUITE: ${{ inputs.suite || (github.event_name == 'pull_request' && 'pr-required') || 'release' }}
    concurrency:
      group: external-smoke-gate-crawl4ai-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.candidate_sha || github.sha }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cache/ms-playwright
            ~/.cache/crawl4ai
            ~/.crawl4ai
          key: release-gate-crawl4ai-${{ runner.os }}-py311-${{ hashFiles('pyproject.toml') }}

      - name: 安装当前源码与 Crawl4AI 可选浏览器运行时
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,edition-full-crawl4ai]"
          if [ "$GATE_SUITE" = "release" ]; then
            python -m playwright install --with-deps chromium
          else
            echo "Skipping Crawl4AI browser runtime install for suite=$GATE_SUITE"
          fi

      - name: 运行 Crawl4AI release/nightly gate
        run: |
          mkdir -p artifacts
          RUNTIME_ARGS=()
          if [ "$GATE_SUITE" = "release" ]; then
            RUNTIME_ARGS=(--require-runtime)
          fi
          python scripts/crawl4ai_functional_check.py \
            --mode fixture \
            "${RUNTIME_ARGS[@]}" \
            --json-report "artifacts/crawl4ai-${GATE_SUITE}-gate.json" \
            --markdown-report "artifacts/crawl4ai-${GATE_SUITE}-gate.md"

      - name: 上传 Crawl4AI gate 报告
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: external-gate-crawl4ai-report
          path: artifacts/
          if-no-files-found: warn
          retention-days: 14

  article-extract-gate:
    name: Article extraction release/nightly gate
    needs: crawl4ai-gate
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GATE_SUITE: ${{ inputs.suite || (github.event_name == 'pull_request' && 'pr-required') || 'release' }}
    concurrency:
      group: external-smoke-gate-article-extract-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.candidate_sha || github.sha }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 安装当前源码与文章抽取运行时
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,edition-full]"

      - name: 运行 Article extraction release/nightly gate
        run: |
          mkdir -p artifacts
          RUNTIME_ARGS=()
          if [ "$GATE_SUITE" = "release" ]; then
            RUNTIME_ARGS=(--require-runtime)
          fi
          python scripts/article_extract_functional_check.py \
            --mode fixture \
            "${RUNTIME_ARGS[@]}" \
            --json-report "artifacts/article-extract-${GATE_SUITE}-gate.json" \
            --markdown-report "artifacts/article-extract-${GATE_SUITE}-gate.md"

      - name: 上传 Article extraction gate 报告
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: external-gate-article-extract-report
          path: artifacts/
          if-no-files-found: warn
          retention-days: 14

  plugin-gate:
    name: Plugin and SuperWeb2PDF release/nightly gate
    needs: article-extract-gate
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      GATE_SUITE: ${{ inputs.suite || (github.event_name == 'pull_request' && 'pr-required') || 'release' }}
    concurrency:
      group: external-smoke-gate-plugin-${{ inputs.candidate_sha || github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.candidate_sha || github.sha }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install source, example plugin, and fixed SuperWeb2PDF runtime
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,edition-full]"
          pip install -e examples/minimal-plugin
          if [ "$GATE_SUITE" = "release" ]; then
            python -m playwright install --with-deps chromium
          fi

      - name: Run plugin and SuperWeb2PDF fixture gate
        run: |
          mkdir -p artifacts
          WEB2PDF_ARGS=(--require-web2pdf)
          if [ "$GATE_SUITE" = "release" ]; then
            WEB2PDF_ARGS=(--require-web2pdf-runtime)
          fi
          python scripts/plugin_functional_check.py \
            --mode fixture \
            --require-installed \
            "${WEB2PDF_ARGS[@]}" \
            --json-report "artifacts/plugin-${GATE_SUITE}-gate.json" \
            --markdown-report "artifacts/plugin-${GATE_SUITE}-gate.md"

      - name: Upload plugin gate report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: external-gate-plugin-report
          path: artifacts/
          if-no-files-found: warn
          retention-days: 14

  zero-key-live-gate:
    name: Zero-key live source gate
    needs: plugin-gate
    if: ${{ always() && github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GATE_SUITE: ${{ inputs.suite || (github.event_name == 'pull_request' && 'pr-required') || 'release' }}
    concurrency:
      group: external-smoke-gate-zero-key-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.candidate_sha || github.sha }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 安装当前源码
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,edition-full]"

      - name: 运行 zero-key live source gate
        run: |
          mkdir -p artifacts
          REQUIRED_ARGS=()
          if [ "$GATE_SUITE" = "release" ]; then
            REQUIRED_ARGS=(--required)
          fi
          python scripts/zero_key_functional_check.py \
            --mode live \
            "${REQUIRED_ARGS[@]}" \
            --timeout 45 \
            --json-report "artifacts/zero-key-${GATE_SUITE}-gate.json" \
            --markdown-report "artifacts/zero-key-${GATE_SUITE}-gate.md"

      - name: 上传 zero-key live source gate 报告
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: external-gate-zero-key-report
          path: artifacts/
          if-no-files-found: warn
          retention-days: 14

  open-nightly-failure-issue:
    name: Nightly failure issue
    needs: [scrapling-gate, crawl4ai-gate, article-extract-gate, plugin-gate, zero-key-live-gate]
    if: >-
      ${{
        always() &&
        github.event_name == 'schedule' &&
        (
          needs.scrapling-gate.result == 'failure' ||
          needs.crawl4ai-gate.result == 'failure' ||
          needs.article-extract-gate.result == 'failure' ||
          needs.plugin-gate.result == 'failure' ||
          needs.zero-key-live-gate.result == 'failure'
        )
      }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Create or update nightly failure issue
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          MARKER: "<!-- external-smoke-nightly-failure -->"
        run: |
          set -euo pipefail
          gh label create "ci:external" \
            --description "External capability smoke failures" \
            --color "D93F0B" \
            --force
          gh label create "smoke-failure" \
            --description "Scheduled smoke gate failure" \
            --color "B60205" \
            --force

          failed_jobs="$(gh run view "$GITHUB_RUN_ID" --json jobs --jq '
            [.jobs[] | select(.conclusion == "failure") | "- [" + .name + "](" + .url + ")"] | join("\n")
          ')"
          if [ -z "$failed_jobs" ]; then
            failed_jobs="- Failed job list was not available yet. See the run URL below."
          fi

          body="$(mktemp)"
          cat > "$body" <<EOF
          $MARKER
          ## External smoke nightly failed

          - Run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID
          - Ref: $GITHUB_REF
          - SHA: $GITHUB_SHA
          - Trigger: $GITHUB_EVENT_NAME

          ## Failed jobs

          $failed_jobs

          ## Next steps

          Download the JSON report artifacts first. Treat required \`FAIL\` as a release blocker; treat \`WARN\` as observed external volatility unless it repeats.
          EOF

          issue_number="$(gh issue list \
            --state open \
            --limit 100 \
            --json number,body \
            --jq '.[] | select(.body | contains(env.MARKER)) | .number' \
            | head -n 1)"

          if [ -n "$issue_number" ]; then
            gh issue comment "$issue_number" --body-file "$body"
          else
            gh issue create \
              --title "External smoke nightly failure" \
              --label "ci:external" \
              --label "smoke-failure" \
              --body-file "$body"
          fi

  close-nightly-failure-issue:
    name: Close recovered nightly issue
    needs: [scrapling-gate, crawl4ai-gate, article-extract-gate, plugin-gate, zero-key-live-gate]
    if: >-
      ${{
        always() &&
        github.event_name == 'schedule' &&
        needs.scrapling-gate.result == 'success' &&
        needs.crawl4ai-gate.result == 'success' &&
        needs.article-extract-gate.result == 'success' &&
        needs.plugin-gate.result == 'success' &&
        needs.zero-key-live-gate.result == 'success'
      }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Close recovered nightly failure issue
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          MARKER: "<!-- external-smoke-nightly-failure -->"
        run: |
          set -euo pipefail
          gh label create "ci:external" \
            --description "External capability smoke failures" \
            --color "D93F0B" \
            --force
          issue_number="$(gh issue list \
            --state open \
            --limit 100 \
            --json number,body \
            --jq '.[] | select(.body | contains(env.MARKER)) | .number' \
            | head -n 1)"
          if [ -n "$issue_number" ]; then
            gh issue close "$issue_number" \
              --comment "External smoke nightly recovered in $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID."
          fi
