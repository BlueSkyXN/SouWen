name: Deploy Hugging Face Space

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "panel/**"
      - "pyproject.toml"
      - "README.md"
      - "souwen.example.yaml"
      - "entrypoint.sh"
      - "scripts/hf_space_smoke.py"
      - "scripts/warp-init.sh"
      - "cloud/hfs/**"
      - ".github/workflows/deploy-hf-space.yml"
  workflow_dispatch:

concurrency:
  group: deploy-hf-space-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    name: Sync changed wrapper files, factory rebuild, and smoke test
    if: github.ref == 'refs/heads/main'
    environment:
      name: hf
      url: https://huggingface.co/spaces/BlueSkyXN/SouWen
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v6

      - name: Check HF token
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "::error::HF_TOKEN is not configured. Add a Hugging Face write token to the hf environment secrets."
            exit 1
          fi

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Hugging Face Hub client
        run: python -m pip install "huggingface_hub>=1.8,<2"

      - name: Read expected SouWen version
        id: project
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import tomllib

          with open("pyproject.toml", "rb") as file:
              project = tomllib.load(file)["project"]
          print(f"version={project['version']}")
          PY

      - name: Sync changed HFS wrapper files
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_ID: BlueSkyXN/SouWen
        run: |
          python - <<'PY'
          import os
          import tempfile
          from pathlib import Path

          from huggingface_hub import CommitOperationAdd, HfApi, hf_hub_download
          from huggingface_hub.errors import EntryNotFoundError

          FILES = {
              "cloud/hfs/Dockerfile": "Dockerfile",
              "cloud/hfs/README.md": "README.md",
              "cloud/hfs/.dockerignore": ".dockerignore",
              "cloud/hfs/entrypoint.sh": "entrypoint.sh",
          }

          api = HfApi(token=os.environ["HF_TOKEN"])
          space_id = os.environ["HF_SPACE_ID"]
          sha = os.environ["GITHUB_SHA"][:7]
          operations = []

          with tempfile.TemporaryDirectory() as tmpdir:
              for local_name, remote_name in FILES.items():
                  local_path = Path(local_name)
                  local_bytes = local_path.read_bytes()

                  try:
                      remote_path = hf_hub_download(
                          repo_id=space_id,
                          repo_type="space",
                          filename=remote_name,
                          token=os.environ["HF_TOKEN"],
                          local_dir=tmpdir,
                          force_download=True,
                      )
                      remote_bytes = Path(remote_path).read_bytes()
                  except EntryNotFoundError:
                      remote_bytes = None

                  if remote_bytes != local_bytes:
                      operations.append(
                          CommitOperationAdd(
                              path_in_repo=remote_name,
                              path_or_fileobj=str(local_path),
                          )
                      )

          if operations:
              changed = ", ".join(op.path_in_repo for op in operations)
              print(f"Sync changed HFS wrapper files: {changed}")
              api.create_commit(
                  repo_id=space_id,
                  repo_type="space",
                  operations=operations,
                  commit_message=f"Sync HFS wrapper from GitHub {sha}",
              )
          else:
              print("No HFS wrapper file changes to sync.")
          PY

      - name: Factory rebuild Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_ID: BlueSkyXN/SouWen
        run: |
          python - <<'PY'
          import os
          from huggingface_hub import HfApi

          api = HfApi(token=os.environ["HF_TOKEN"])
          space_id = os.environ["HF_SPACE_ID"]
          runtime = api.restart_space(
              repo_id=space_id,
              factory_reboot=True,
          )
          print(f"Requested factory rebuild for {space_id}; stage={runtime.stage}")
          PY

      - name: Wait for Space runtime
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_ID: BlueSkyXN/SouWen
        run: |
          python - <<'PY'
          import os
          import time

          from huggingface_hub import HfApi

          api = HfApi(token=os.environ["HF_TOKEN"])
          space_id = os.environ["HF_SPACE_ID"]
          deadline = time.monotonic() + 900
          last_stage = "unknown"

          while time.monotonic() < deadline:
              runtime = api.get_space_runtime(repo_id=space_id)
              stage = getattr(runtime.stage, "value", runtime.stage)
              last_stage = str(stage)
              print(f"Space runtime stage={last_stage}")
              if last_stage.upper().endswith("RUNNING"):
                  print("Space runtime is RUNNING.")
                  break
              time.sleep(20)
          else:
              raise SystemExit(f"Space runtime did not reach RUNNING; last_stage={last_stage}")
          PY

      - name: Post-deploy smoke test
        env:
          EXPECTED_SOUWEN_VERSION: ${{ steps.project.outputs.version }}
          SOUWEN_HF_SPACE_URL: https://blueskyxn-souwen.hf.space
          SOUWEN_SMOKE_REQUEST_TIMEOUT: "20"
          SOUWEN_SMOKE_WARP_MODES: auto
          SOUWEN_SMOKE_REPORT_FILE: hf-space-cd-report.md
          SOUWEN_SMOKE_JSON_FILE: hf-space-cd-report.json
          SOUWEN_SMOKE_BEARER_TOKEN: ${{ secrets.SOUWEN_SMOKE_BEARER_TOKEN }}
        run: python scripts/hf_space_smoke.py

      - name: Upload post-deploy test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: hf-space-cd-report
          path: |
            hf-space-cd-report.md
            hf-space-cd-report.json
          if-no-files-found: warn
