name: HF Space CD

on:
  workflow_call:
    inputs:
      candidate_sha:
        description: "要部署的 40 位候选提交 SHA"
        required: true
        type: string
      version:
        description: "必须与候选 pyproject.toml 一致的 PEP 440 版本"
        required: true
        type: string
      verifier_sha:
        description: "来自受信 main control plane 的 40 位 smoke harness SHA"
        required: true
        type: string
      deploy_hfs:
        description: "显式执行 HFS promotion 与验收"
        required: true
        type: boolean
    outputs:
      space_commit_sha:
        description: "Space repository commit verified by runtime.raw.sha"
        value: ${{ jobs.sync-hfs-wrapper.outputs.space_commit_sha }}
      version:
        description: "Promoted SouWen version"
        value: ${{ jobs.sync-hfs-wrapper.outputs.version }}
      promotion_changed:
        description: "Whether this run created a new Space wrapper commit"
        value: ${{ jobs.sync-hfs-wrapper.outputs.promotion_changed }}
      prior_space_commit_sha:
        description: "Immutable Space wrapper commit captured before promotion"
        value: ${{ jobs.sync-hfs-wrapper.outputs.prior_space_commit_sha }}
      prior_runtime_commit_sha:
        description: "Space runtime commit captured before promotion"
        value: ${{ jobs.sync-hfs-wrapper.outputs.prior_runtime_commit_sha }}
      prior_souwen_ref:
        description: "Immutable SouWen source pin captured before promotion"
        value: ${{ jobs.sync-hfs-wrapper.outputs.prior_souwen_ref }}
      prior_runtime_stage:
        description: "Stable Space runtime stage captured before promotion"
        value: ${{ jobs.sync-hfs-wrapper.outputs.prior_runtime_stage }}
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "panel/**"
      - "pyproject.toml"
      - "README.md"
      - "README.en.md"
      - "docs/**"
      - "souwen.example.yaml"
      - "entrypoint.sh"
      - "scripts/ci/**"
      - "cli.py"
      - "scripts/hf_space_smoke.py"
      - "scripts/warp-init.sh"
      - "cloud/hfs/**"
      - ".github/workflows/deploy-hf-space.yml"
      - ".github/workflows/build-pyinstaller.yml"
  workflow_dispatch:

concurrency:
  # One mutable Space is promoted at a time; local preflights remain cancellable.
  group: hf-space-cd-${{ inputs.deploy_hfs && 'promotion' || github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ !inputs.deploy_hfs }}

permissions:
  contents: read

jobs:
  detect-changes:
    name: Resolve deploy eligibility
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      deploy_changed: ${{ steps.deploy-paths.outputs.deploy_changed }}
      reason: ${{ steps.deploy-paths.outputs.reason }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.candidate_sha || github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Validate reusable candidate contract
        if: ${{ inputs.deploy_hfs }}
        env:
          CANDIDATE_SHA: ${{ inputs.candidate_sha }}
          EXPECTED_VERSION: ${{ inputs.version }}
          VERIFIER_SHA: ${{ inputs.verifier_sha }}
          DEPLOY_HFS: ${{ inputs.deploy_hfs }}
          WORKFLOW_REF: ${{ github.ref }}
          WORKFLOW_SHA: ${{ github.workflow_sha }}
        run: |
          python3 -I - <<'PY'
          import os
          import re
          import subprocess
          import tomllib

          candidate = os.environ["CANDIDATE_SHA"]
          version = os.environ["EXPECTED_VERSION"]
          verifier = os.environ["VERIFIER_SHA"]
          if re.fullmatch(r"[0-9a-f]{40}", candidate) is None:
              raise SystemExit("candidate_sha must be exactly 40 lowercase hexadecimal characters")
          if re.fullmatch(r"[0-9a-f]{40}", verifier) is None:
              raise SystemExit("verifier_sha must be exactly 40 lowercase hexadecimal characters")
          if os.environ["DEPLOY_HFS"] != "true":
              raise SystemExit("reusable HF Space CD requires deploy_hfs=true")
          if os.environ["WORKFLOW_REF"] != "refs/heads/main":
              raise SystemExit("HF promotion requires a control-plane workflow from main")
          if verifier != os.environ["WORKFLOW_SHA"]:
              raise SystemExit("verifier_sha must equal the caller workflow SHA")
          head = subprocess.check_output(["git", "rev-parse", "HEAD"], text=True).strip()
          if head != candidate:
              raise SystemExit(f"checkout mismatch: expected {candidate}, got {head}")
          with open("pyproject.toml", "rb") as file:
              actual_version = tomllib.load(file)["project"]["version"]
          if actual_version != version:
              raise SystemExit(
                  f"version mismatch: input={version!r}, pyproject={actual_version!r}"
              )
          print(f"validated immutable HFS candidate {candidate} version {version}")
          PY

      - name: Detect deploy-related path changes
        id: deploy-paths
        env:
          REQUESTED_DEPLOY_HFS: ${{ inputs.deploy_hfs }}
        run: |
          python - <<'PY'
          import os

          event = os.environ["GITHUB_EVENT_NAME"]
          ref = os.environ["GITHUB_REF"]
          output_path = os.environ["GITHUB_OUTPUT"]

          def write_output(deploy_changed: bool, reason: str) -> None:
              with open(output_path, "a", encoding="utf-8") as output:
                  output.write(f"deploy_changed={'true' if deploy_changed else 'false'}\n")
                  output.write(f"reason={reason}\n")
              print(f"deploy_changed={deploy_changed}, reason={reason}")

          if os.environ.get("REQUESTED_DEPLOY_HFS") == "true":
              write_output(True, "release-candidate")
              raise SystemExit
          write_output(False, f"{event}:{ref}:local-preflight-only")
          PY

  api-source-cli:
    name: API surface and source CLI
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.candidate_sha || github.event.pull_request.head.sha || github.sha }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install source package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,edition-pro]"

      - name: Run API and source CLI profiles
        env:
          PYTHONIOENCODING: utf-8
        run: |
          mkdir -p artifacts
          python scripts/ci/run_profile.py \
            --profile pro-cli \
            --profile basic-cli \
            --json-report artifacts/api-source-cli-profile.json \
            --markdown-report artifacts/api-source-cli-profile.md

      - name: Upload API and source CLI profile report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: api-source-cli-profile-report
          path: artifacts/
          if-no-files-found: warn
          retention-days: 7

  pyinstaller-cli:
    name: PyInstaller CLI smoke
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.candidate_sha || github.event.pull_request.head.sha || github.sha }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package and PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[edition-basic]"
          pip install "setuptools<82" pyinstaller

      - name: Materialize immutable source provenance
        run: >-
          printf '%s\n'
          '${{ inputs.candidate_sha || github.event.pull_request.head.sha || github.sha }}'
          > runtime.source.sha

      - name: Build basic executable with MCP retained
        run: |
          pyinstaller --onefile --clean --name souwen-local \
            --paths src \
            --add-data "runtime.source.sha:." \
            --exclude-module=souwen.server \
            --exclude-module=souwen.llm \
            --exclude-module=fastapi \
            --exclude-module=souwen.web.crawl4ai_fetcher \
            --exclude-module=souwen.web.scrapling_fetcher \
            --exclude-module=souwen.web.newspaper_fetcher \
            --exclude-module=souwen.web.readability_fetcher \
            --exclude-module=souwen.paper.arxiv_fulltext \
            --exclude-module=pymupdf4llm \
            --exclude-module=superweb2pdf \
            --exclude-module=pkg_resources \
            --exclude-module=setuptools \
            --hidden-import=souwen.integrations.mcp_server \
            --collect-submodules=souwen.integrations.mcp \
            --collect-submodules=mcp \
            --collect-submodules=souwen.registry.sources \
            --collect-submodules=rich._unicode_data \
            cli.py

      - name: Run tier-aware basic binary smoke
        uses: ./.github/actions/binary-smoke
        with:
          binary: ./dist/souwen-local
          profile: basic-cli
          edition: basic
          builder: pyinstaller
          candidate-sha: ${{ inputs.candidate_sha || github.event.pull_request.head.sha || github.sha }}
          report-json: artifacts/hf-space-local-pyinstaller.json
          report-markdown: artifacts/hf-space-local-pyinstaller.md

      - name: Upload PyInstaller smoke evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: hf-space-local-pyinstaller-report
          path: artifacts/
          if-no-files-found: warn
          retention-days: 7

      - name: Upload PyInstaller CLI artifact
        uses: actions/upload-artifact@v7
        with:
          name: souwen-local-pyinstaller-cli
          path: dist/souwen-local
          retention-days: 7

  docker-hfs:
    name: HF Space Docker surface smoke
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      PR_HEAD_REPO: ${{ github.event.pull_request.head.repo.clone_url }}
      PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      DEFAULT_REPO: https://github.com/${{ github.repository }}.git
      DEFAULT_REF: ${{ inputs.candidate_sha || github.event.pull_request.head.sha || github.sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.candidate_sha || github.event.pull_request.head.sha || github.sha }}

      - name: Resolve source ref for HFS Dockerfile clone
        id: source
        run: |
          SOURCE_REPO="${PR_HEAD_REPO:-$DEFAULT_REPO}"
          SOURCE_REF="${PR_HEAD_SHA:-$DEFAULT_REF}"
          if [ -z "$SOURCE_REPO" ] || [ -z "$SOURCE_REF" ]; then
            echo "::error::Cannot resolve source repo/ref for Docker build"
            exit 1
          fi
          {
            echo "repo=$SOURCE_REPO"
            echo "ref=$SOURCE_REF"
          } >> "$GITHUB_OUTPUT"
          echo "HFS Docker source: $SOURCE_REPO @ $SOURCE_REF"

      - name: Build HF Space Docker image from current ref
        run: |
          docker build \
            -f cloud/hfs/Dockerfile \
            --build-arg SOUWEN_REPO="${{ steps.source.outputs.repo }}" \
            --build-arg SOUWEN_REF="${{ steps.source.outputs.ref }}" \
            --build-arg SKINS=souwen-google \
            --build-arg WITH_WEB2PDF=0 \
            -t "souwen-hfs-local:${GITHUB_SHA::7}" \
            cloud/hfs

      - name: Run container and wait for readiness
        run: |
          docker run -d --name souwen-hfs-local \
            -p 49265:49265 \
            -e SOUWEN_ADMIN_OPEN=1 \
            -e SOUWEN_EXPOSE_DOCS=1 \
            -e WARP_ENABLED=0 \
            "souwen-hfs-local:${GITHUB_SHA::7}"

          for attempt in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:49265/health; then
              exit 0
            fi
            echo "Waiting for health (${attempt}/60)"
            sleep 2
          done

          docker logs souwen-hfs-local
          exit 1

      - name: Run local API surface smoke
        env:
          SOUWEN_SMOKE_REPORT_FILE: hf-space-local-surface-report.md
          SOUWEN_SMOKE_JSON_FILE: hf-space-local-surface-report.json
          EXPECTED_SOUWEN_SOURCE_SHA: ${{ inputs.candidate_sha || github.event.pull_request.head.sha || github.sha }}
        run: |
          VERSION="$(python3 - <<'PY'
          import tomllib
          with open("pyproject.toml", "rb") as file:
              print(tomllib.load(file)["project"]["version"])
          PY
          )"
          python3 scripts/hf_space_smoke.py \
            --base-url http://127.0.0.1:49265 \
            --expected-version "$VERSION" \
            --request-timeout 10 \
            --surface-only

      - name: Verify browser entry HTML explicitly
        run: |
          curl -fsSL http://127.0.0.1:49265/docs -o /tmp/souwen-docs.html
          grep -Eiq 'Swagger UI|swagger-ui' /tmp/souwen-docs.html
          curl -fsSL http://127.0.0.1:49265/panel -o /tmp/souwen-panel.html
          grep -Eiq 'id="root"|SouWen|souwen' /tmp/souwen-panel.html

      - name: Show container logs
        if: always()
        run: docker logs souwen-hfs-local || true

      - name: Stop container
        if: always()
        run: docker rm -f souwen-hfs-local || true

      - name: Upload local smoke reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: hf-space-local-surface-report
          path: |
            hf-space-local-surface-report.md
            hf-space-local-surface-report.json
          if-no-files-found: warn
          retention-days: 7

  sync-hfs-wrapper:
    name: Sync HFS wrapper files
    if: >-
      ${{
        needs.detect-changes.outputs.deploy_changed == 'true' &&
        inputs.deploy_hfs
      }}
    needs: [detect-changes, api-source-cli, pyinstaller-cli, docker-hfs]
    environment:
      name: hf
      deployment: false
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      version: ${{ steps.project.outputs.version }}
      space_commit_sha: ${{ steps.sync.outputs.space_commit_sha }}
      promotion_changed: ${{ steps.sync.outputs.promotion_changed }}
      prior_space_commit_sha: ${{ steps.prior.outputs.prior_space_commit_sha }}
      prior_runtime_commit_sha: ${{ steps.prior.outputs.prior_runtime_commit_sha }}
      prior_souwen_ref: ${{ steps.prior.outputs.prior_souwen_ref }}
      prior_runtime_stage: ${{ steps.prior.outputs.prior_runtime_stage }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.candidate_sha || github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Check HF token
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "::error::HF_TOKEN is not configured. Add a Hugging Face write token to the hf environment secrets."
            exit 1
          fi

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Hugging Face Hub client
        run: python -m pip install "huggingface_hub>=1.8,<2"

      - name: Read expected SouWen version
        id: project
        run: |
          python -I - <<'PY' >> "$GITHUB_OUTPUT"
          import tomllib

          with open("pyproject.toml", "rb") as file:
              project = tomllib.load(file)["project"]
          print(f"version={project['version']}")
          PY

      - name: Capture immutable rollback point
        id: prior
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_ID: BlueSkyXN/SouWen
        run: |
          python -I - <<'PY'
          import os
          import re
          import time
          from pathlib import Path

          from huggingface_hub import HfApi, hf_hub_download

          api = HfApi(token=os.environ["HF_TOKEN"])
          space_id = os.environ["HF_SPACE_ID"]
          target_info = api.repo_info(repo_id=space_id, repo_type="space")
          if target_info.private is not True:
              raise SystemExit(
                  f"refusing promotion: target Space {space_id} must already be private"
              )
          prior_space_sha = str(target_info.sha)
          if re.fullmatch(r"[0-9a-f]{40}", prior_space_sha) is None:
              raise SystemExit("target Space does not expose an immutable 40-character commit")

          deadline = time.monotonic() + 900
          while True:
              runtime = api.get_space_runtime(repo_id=space_id)
              stage = str(getattr(runtime.stage, "value", runtime.stage))
              runtime_sha = str(runtime.raw.get("sha") or "")
              current_repo_sha = str(
                  api.repo_info(repo_id=space_id, repo_type="space").sha
              )
              if current_repo_sha != prior_space_sha:
                  raise SystemExit(
                      "Space repository changed while capturing the rollback point: "
                      f"expected={prior_space_sha}, current={current_repo_sha}"
                  )

              stage_upper = stage.upper()
              stable = stage_upper.endswith("RUNNING") or stage_upper.endswith("SLEEPING")
              if stable and runtime_sha == prior_space_sha:
                  break
              if any(
                  marker in stage_upper
                  for marker in (
                      "PAUSED",
                      "BUILD_ERROR",
                      "RUNTIME_ERROR",
                      "CONFIG_ERROR",
                      "NO_APP_FILE",
                      "STOPPED",
                  )
              ):
                  raise SystemExit(
                      "refusing to mutate a Space without a stable rollback runtime: "
                      f"stage={stage}, repo_sha={prior_space_sha}, runtime_sha={runtime_sha}"
                  )
              if time.monotonic() >= deadline:
                  raise SystemExit(
                      "cannot establish rollback point before promotion: "
                      f"stage={stage}, repo_sha={prior_space_sha}, runtime_sha={runtime_sha}"
                  )
              print(
                  f"rollback-point stage={stage}, repo_sha={prior_space_sha}, "
                  f"runtime_sha={runtime_sha}"
              )
              time.sleep(20)

          dockerfile = Path(
              hf_hub_download(
                  repo_id=space_id,
                  repo_type="space",
                  filename="Dockerfile",
                  revision=prior_space_sha,
                  token=os.environ["HF_TOKEN"],
                  force_download=True,
              )
          ).read_text(encoding="utf-8")
          matches = re.findall(r"^ARG SOUWEN_REF=([0-9a-f]{40})$", dockerfile, re.MULTILINE)
          if len(matches) != 1:
              raise SystemExit(
                  "target Space Dockerfile must contain exactly one immutable SOUWEN_REF "
                  "before automatic promotion/rollback is allowed"
              )
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"prior_space_commit_sha={prior_space_sha}\n")
              output.write(f"prior_runtime_commit_sha={runtime_sha}\n")
              output.write(f"prior_souwen_ref={matches[0]}\n")
              output.write(f"prior_runtime_stage={stage}\n")
          print(
              f"captured rollback point space={prior_space_sha}, "
              f"runtime={runtime_sha}, stage={stage}, source={matches[0]}"
          )
          PY

      - name: Sync changed HFS wrapper files
        id: sync
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_ID: BlueSkyXN/SouWen
          CANDIDATE_SHA: ${{ inputs.candidate_sha || github.event.pull_request.head.sha || github.sha }}
          PRIOR_SPACE_SHA: ${{ steps.prior.outputs.prior_space_commit_sha }}
        run: |
          python -I - <<'PY'
          import os
          import re
          import tempfile
          from pathlib import Path

          from huggingface_hub import CommitOperationAdd, HfApi, hf_hub_download
          from huggingface_hub.errors import EntryNotFoundError

          FILES = {
              "cloud/hfs/Dockerfile": "Dockerfile",
              "cloud/hfs/README.md": "README.md",
              "cloud/hfs/.dockerignore": ".dockerignore",
              "cloud/hfs/entrypoint.sh": "entrypoint.sh",
          }

          api = HfApi(token=os.environ["HF_TOKEN"])
          space_id = os.environ["HF_SPACE_ID"]
          prior_space_sha = os.environ["PRIOR_SPACE_SHA"]
          candidate_sha = os.environ["CANDIDATE_SHA"]
          if re.fullmatch(r"[0-9a-f]{40}", candidate_sha) is None:
              raise SystemExit("refusing to deploy a non-immutable candidate SHA")
          operations = []

          with tempfile.TemporaryDirectory() as tmpdir:
              tmp = Path(tmpdir)
              for local_name, remote_name in FILES.items():
                  local_path = Path(local_name)
                  local_bytes = local_path.read_bytes()
                  if remote_name == "Dockerfile":
                      marker = b"ARG SOUWEN_REF=0000000000000000000000000000000000000000"
                      if local_bytes.count(marker) != 1:
                          raise SystemExit("cloud/hfs/Dockerfile SOUWEN_REF marker changed")
                      local_bytes = local_bytes.replace(
                          marker,
                          f"ARG SOUWEN_REF={candidate_sha}".encode(),
                      )

                  try:
                      remote_path = hf_hub_download(
                          repo_id=space_id,
                          repo_type="space",
                          filename=remote_name,
                          revision=prior_space_sha,
                          token=os.environ["HF_TOKEN"],
                          local_dir=tmp / "download",
                          force_download=True,
                      )
                      remote_bytes = Path(remote_path).read_bytes()
                  except EntryNotFoundError:
                      remote_bytes = None

                  if remote_bytes != local_bytes:
                      operations.append(
                          CommitOperationAdd(
                              path_in_repo=remote_name,
                              path_or_fileobj=local_bytes,
                          )
                      )

          if operations:
              changed = ", ".join(op.path_in_repo for op in operations)
              print(f"Sync changed HFS wrapper files: {changed}")
              commit = api.create_commit(
                  repo_id=space_id,
                  repo_type="space",
                  operations=operations,
                  commit_message=f"Promote SouWen candidate {candidate_sha[:12]}",
                  parent_commit=prior_space_sha,
              )
              space_commit_sha = commit.oid
              promotion_changed = "true"
          else:
              print("No HFS wrapper file changes to sync.")
              current_sha = str(api.repo_info(repo_id=space_id, repo_type="space").sha)
              if current_sha != prior_space_sha:
                  raise SystemExit(
                      "Space repository changed after rollback snapshot: "
                      f"expected={prior_space_sha}, current={current_sha}"
                  )
              space_commit_sha = current_sha
              promotion_changed = "false"

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"space_commit_sha={space_commit_sha}\n")
              output.write(f"promotion_changed={promotion_changed}\n")

          pinned_dockerfile = Path(
              hf_hub_download(
                  repo_id=space_id,
                  repo_type="space",
                  filename="Dockerfile",
                  revision=space_commit_sha,
                  token=os.environ["HF_TOKEN"],
                  force_download=True,
              )
          ).read_text(encoding="utf-8")
          expected_pin = f"ARG SOUWEN_REF={candidate_sha}"
          if pinned_dockerfile.splitlines().count(expected_pin) != 1:
              raise SystemExit(
                  f"Space commit {space_commit_sha} does not pin candidate source provenance"
              )
          print(f"Space commit {space_commit_sha} pins candidate {candidate_sha}")
          PY

  rebuild-space:
    name: Factory rebuild Space
    if: >-
      ${{
        needs.detect-changes.outputs.deploy_changed == 'true' &&
        inputs.deploy_hfs
      }}
    needs: [detect-changes, sync-hfs-wrapper]
    environment:
      name: hf
      url: https://huggingface.co/spaces/BlueSkyXN/SouWen
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Hugging Face Hub client
        run: python -m pip install "huggingface_hub>=1.8,<2"

      - name: Factory rebuild Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_ID: BlueSkyXN/SouWen
        run: |
          python -I - <<'PY'
          import os
          from huggingface_hub import HfApi

          api = HfApi(token=os.environ["HF_TOKEN"])
          space_id = os.environ["HF_SPACE_ID"]
          runtime = api.restart_space(
              repo_id=space_id,
              factory_reboot=True,
          )
          print(f"Requested factory rebuild for {space_id}; stage={runtime.stage}")
          PY

      - name: Wait for Space runtime
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_ID: BlueSkyXN/SouWen
          EXPECTED_SPACE_SHA: ${{ needs.sync-hfs-wrapper.outputs.space_commit_sha }}
        run: |
          python -I - <<'PY'
          import os
          import time

          from huggingface_hub import HfApi

          api = HfApi(token=os.environ["HF_TOKEN"])
          space_id = os.environ["HF_SPACE_ID"]
          expected_sha = os.environ["EXPECTED_SPACE_SHA"]
          deadline = time.monotonic() + 900
          last_stage = "unknown"
          last_runtime_sha = "unknown"

          while time.monotonic() < deadline:
              runtime = api.get_space_runtime(repo_id=space_id)
              stage = getattr(runtime.stage, "value", runtime.stage)
              last_stage = str(stage)
              last_runtime_sha = str(runtime.raw.get("sha") or "unknown")
              repo_sha = str(api.repo_info(repo_id=space_id, repo_type="space").sha)
              print(
                  f"Space stage={last_stage}, repo_sha={repo_sha}, "
                  f"runtime_sha={last_runtime_sha}, expected={expected_sha}"
              )
              if (
                  last_stage.upper().endswith("RUNNING")
                  and repo_sha == expected_sha
                  and last_runtime_sha == expected_sha
              ):
                  print("Space repo and live runtime both match the promoted commit.")
                  break
              time.sleep(20)
          else:
              raise SystemExit(
                  "Space did not take over the promoted commit: "
                  f"stage={last_stage}, runtime_sha={last_runtime_sha}, expected={expected_sha}"
              )
          PY

  post-deploy-smoke:
    name: Post-deploy smoke matrix
    if: >-
      ${{
        needs.detect-changes.outputs.deploy_changed == 'true' &&
        inputs.deploy_hfs
      }}
    needs: [detect-changes, sync-hfs-wrapper, rebuild-space]
    environment:
      name: hf
      deployment: false
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - mode: surface
            args: "--surface-only"
            report: hf-space-cd-surface-report.md
            json: hf-space-cd-surface-report.json
            artifact: hf-space-cd-surface-report
          - mode: capability
            args: ""
            report: hf-space-cd-capability-report.md
            json: hf-space-cd-capability-report.json
            artifact: hf-space-cd-capability-report
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.verifier_sha }}
          persist-credentials: false
          path: trusted-verifier

      - name: Run ${{ matrix.mode }} post-deploy smoke
        env:
          EXPECTED_SOUWEN_VERSION: ${{ needs.sync-hfs-wrapper.outputs.version }}
          EXPECTED_SOUWEN_SOURCE_SHA: ${{ inputs.candidate_sha || github.event.pull_request.head.sha || github.sha }}
          SOUWEN_HF_SPACE_URL: https://blueskyxn-souwen.hf.space
          SOUWEN_HF_SPACE_TOKEN: ${{ secrets.HF_SPACE_READ_TOKEN }}
          SOUWEN_SMOKE_REQUEST_TIMEOUT: "20"
          SOUWEN_SMOKE_WARP_MODES: auto
          SOUWEN_SMOKE_FAIL_ADMIN_OPEN: "1"
          SOUWEN_SMOKE_REPORT_FILE: ${{ github.workspace }}/${{ matrix.report }}
          SOUWEN_SMOKE_JSON_FILE: ${{ github.workspace }}/${{ matrix.json }}
          SOUWEN_SMOKE_BEARER_TOKEN: ${{ secrets.SOUWEN_SMOKE_BEARER_TOKEN }}
          SMOKE_ARGS: ${{ matrix.args }}
        run: |
          if [ -z "$SOUWEN_SMOKE_BEARER_TOKEN" ]; then
            echo "::error::SOUWEN_SMOKE_BEARER_TOKEN is required for candidate promotion"
            exit 1
          fi
          if [ -z "$SOUWEN_HF_SPACE_TOKEN" ]; then
            echo "::error::HF_SPACE_READ_TOKEN is required for private Space smoke"
            exit 1
          fi
          args=()
          if [ -n "$SMOKE_ARGS" ]; then
            args+=("$SMOKE_ARGS")
          fi
          (
            cd trusted-verifier
            python scripts/hf_space_smoke.py "${args[@]}"
          )

      - name: Verify token admin and fail-closed admin access
        env:
          SOUWEN_HF_SPACE_URL: https://blueskyxn-souwen.hf.space
          HF_SPACE_READ_TOKEN: ${{ secrets.HF_SPACE_READ_TOKEN }}
          SOUWEN_SMOKE_BEARER_TOKEN: ${{ secrets.SOUWEN_SMOKE_BEARER_TOKEN }}
        run: |
          if [ -z "$HF_SPACE_READ_TOKEN" ] || [ -z "$SOUWEN_SMOKE_BEARER_TOKEN" ]; then
            echo "::error::Both HF_SPACE_READ_TOKEN and SOUWEN_SMOKE_BEARER_TOKEN are required"
            exit 1
          fi
          response="$(curl -fsS \
            -H "Authorization: Bearer $HF_SPACE_READ_TOKEN" \
            -H "X-SouWen-Token: $SOUWEN_SMOKE_BEARER_TOKEN" \
            "$SOUWEN_HF_SPACE_URL/api/v1/whoami")"
          jq -e '.role == "admin" and .admin_open == false' <<<"$response" >/dev/null

          unauth_body="$(mktemp)"
          unauth_status="$(curl -sS -o "$unauth_body" -w '%{http_code}' \
            -H "Authorization: Bearer $HF_SPACE_READ_TOKEN" \
            "$SOUWEN_HF_SPACE_URL/api/v1/whoami")"
          if [ "$unauth_status" = 401 ]; then
            exit 0
          fi
          test "$unauth_status" = 200
          jq -e '.role != "admin" and .admin_open != true' "$unauth_body" >/dev/null

      - name: Upload post-deploy test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.report }}
            ${{ matrix.json }}
          if-no-files-found: warn

  rollback-space:
    name: Restore previous Space revision after failed promotion
    needs: [sync-hfs-wrapper, rebuild-space, post-deploy-smoke]
    if: >-
      ${{
        always() &&
        inputs.deploy_hfs &&
        needs.sync-hfs-wrapper.outputs.prior_space_commit_sha != '' &&
        (
          needs.sync-hfs-wrapper.result != 'success' ||
          needs.rebuild-space.result != 'success' ||
          needs.post-deploy-smoke.result != 'success'
        )
      }}
    environment:
      name: hf
      deployment: false
    runs-on: ubuntu-latest
    timeout-minutes: 40
    outputs:
      rollback_space_commit_sha: ${{ steps.restore.outputs.rollback_space_commit_sha }}
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Hugging Face Hub client
        run: python -m pip install "huggingface_hub>=1.8,<2"

      - name: Restore managed wrapper files and verify live source
        id: restore
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_READ_TOKEN: ${{ secrets.HF_SPACE_READ_TOKEN }}
          HF_SPACE_ID: BlueSkyXN/SouWen
          HF_SPACE_URL: https://blueskyxn-souwen.hf.space
          PRIOR_SPACE_SHA: ${{ needs.sync-hfs-wrapper.outputs.prior_space_commit_sha }}
          PRIOR_SOUWEN_REF: ${{ needs.sync-hfs-wrapper.outputs.prior_souwen_ref }}
          PROMOTED_SPACE_SHA: ${{ needs.sync-hfs-wrapper.outputs.space_commit_sha }}
        run: |
          python -I - <<'PY'
          import json
          import os
          import re
          import tempfile
          import time
          from pathlib import Path
          from urllib.request import Request, urlopen

          from huggingface_hub import (
              CommitOperationAdd,
              CommitOperationDelete,
              HfApi,
              hf_hub_download,
          )
          from huggingface_hub.errors import EntryNotFoundError

          MANAGED_FILES = ("Dockerfile", "README.md", ".dockerignore", "entrypoint.sh")

          hf_token = os.environ.get("HF_TOKEN", "")
          read_token = os.environ.get("HF_SPACE_READ_TOKEN", "")
          if not hf_token or not read_token:
              raise SystemExit(
                  "HF_TOKEN and HF_SPACE_READ_TOKEN are required for verified rollback"
              )
          prior_sha = os.environ["PRIOR_SPACE_SHA"]
          prior_source = os.environ["PRIOR_SOUWEN_REF"]
          promoted_sha = os.environ.get("PROMOTED_SPACE_SHA", "")
          if re.fullmatch(r"[0-9a-f]{40}", prior_sha) is None:
              raise SystemExit("rollback point is not an immutable Space commit")
          if re.fullmatch(r"[0-9a-f]{40}", prior_source) is None:
              raise SystemExit("rollback point does not contain an immutable SouWen source SHA")

          api = HfApi(token=hf_token)
          space_id = os.environ["HF_SPACE_ID"]
          current_sha = str(api.repo_info(repo_id=space_id, repo_type="space").sha)
          allowed_heads = {prior_sha}
          if re.fullmatch(r"[0-9a-f]{40}", promoted_sha):
              allowed_heads.add(promoted_sha)
          if current_sha not in allowed_heads:
              raise SystemExit(
                  "refusing to overwrite an unexpected Space writer during rollback: "
                  f"current={current_sha}, expected one of {sorted(allowed_heads)}"
              )
          operations = []
          with tempfile.TemporaryDirectory() as tmpdir:
              tmp = Path(tmpdir)
              for filename in MANAGED_FILES:
                  try:
                      prior_path = hf_hub_download(
                          repo_id=space_id,
                          repo_type="space",
                          filename=filename,
                          revision=prior_sha,
                          token=hf_token,
                          local_dir=tmp / "prior",
                          force_download=True,
                      )
                      prior_bytes = Path(prior_path).read_bytes()
                  except EntryNotFoundError:
                      prior_bytes = None
                  try:
                      current_path = hf_hub_download(
                          repo_id=space_id,
                          repo_type="space",
                          filename=filename,
                          revision=current_sha,
                          token=hf_token,
                          local_dir=tmp / "current",
                          force_download=True,
                      )
                      current_bytes = Path(current_path).read_bytes()
                  except EntryNotFoundError:
                      current_bytes = None

                  if prior_bytes == current_bytes:
                      continue
                  if prior_bytes is None:
                      operations.append(CommitOperationDelete(path_in_repo=filename))
                  else:
                      operations.append(
                          CommitOperationAdd(
                              path_in_repo=filename,
                              path_or_fileobj=prior_bytes,
                          )
                      )

          if not operations:
              if current_sha != prior_sha:
                  raise SystemExit("rollback found no managed wrapper difference to restore")
              rollback_sha = prior_sha
              print(
                  "Space head still matches the rollback point; rebuilding and validating "
                  "the prior runtime without creating a no-op commit"
              )
          else:
              rollback = api.create_commit(
                  repo_id=space_id,
                  repo_type="space",
                  operations=operations,
                  commit_message=f"Rollback failed SouWen promotion to {prior_source[:12]}",
                  parent_commit=current_sha,
              )
              rollback_sha = str(rollback.oid)
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"rollback_space_commit_sha={rollback_sha}\n")

          restored_dockerfile = Path(
              hf_hub_download(
                  repo_id=space_id,
                  repo_type="space",
                  filename="Dockerfile",
                  revision=rollback_sha,
                  token=hf_token,
                  force_download=True,
              )
          ).read_text(encoding="utf-8")
          if restored_dockerfile.splitlines().count(
              f"ARG SOUWEN_REF={prior_source}"
          ) != 1:
              raise SystemExit("rollback commit does not restore the prior SouWen source pin")

          api.restart_space(repo_id=space_id, factory_reboot=True)
          deadline = time.monotonic() + 900
          last_stage = "unknown"
          last_runtime_sha = "unknown"
          while time.monotonic() < deadline:
              runtime = api.get_space_runtime(repo_id=space_id)
              last_stage = str(getattr(runtime.stage, "value", runtime.stage))
              last_runtime_sha = str(runtime.raw.get("sha") or "")
              repo_sha = str(api.repo_info(repo_id=space_id, repo_type="space").sha)
              print(
                  f"rollback stage={last_stage}, repo_sha={repo_sha}, "
                  f"runtime_sha={last_runtime_sha}, expected={rollback_sha}"
              )
              if (
                  last_stage.upper().endswith("RUNNING")
                  and repo_sha == rollback_sha
                  and last_runtime_sha == rollback_sha
              ):
                  break
              time.sleep(20)
          else:
              raise SystemExit(
                  "rollback runtime did not take over the forward rollback commit: "
                  f"stage={last_stage}, runtime_sha={last_runtime_sha}, expected={rollback_sha}"
              )

          for endpoint in ("/health", "/readiness"):
              request = Request(
                  f"{os.environ['HF_SPACE_URL']}{endpoint}",
                  headers={
                      "Accept": "application/json",
                      "Authorization": f"Bearer {read_token}",
                  },
              )
              with urlopen(request, timeout=30) as response:  # noqa: S310 - fixed Space URL
                  payload = json.loads(response.read().decode("utf-8"))
              if payload.get("source_sha") != prior_source:
                  raise SystemExit(
                      f"rollback {endpoint} source mismatch: "
                      f"expected={prior_source}, actual={payload.get('source_sha')}"
                  )
          print(
              f"rollback verified: wrapper/runtime={rollback_sha}, source={prior_source}"
          )
          PY

  pause-space:
    name: Pause Space when automatic rollback cannot be proven
    needs: rollback-space
    if: >-
      ${{
        always() &&
        inputs.deploy_hfs &&
        (
          needs.rollback-space.result == 'failure' ||
          needs.rollback-space.result == 'cancelled'
        )
      }}
    environment:
      name: hf
      deployment: false
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Hugging Face Hub client
        run: python -m pip install "huggingface_hub>=1.8,<2"

      - name: Pause and verify Space runtime
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_ID: BlueSkyXN/SouWen
        run: |
          python -I - <<'PY'
          import os
          import time

          from huggingface_hub import HfApi

          token = os.environ.get("HF_TOKEN", "")
          if not token:
              raise SystemExit("HF_TOKEN is required to pause a failed promotion")
          api = HfApi(token=token)
          space_id = os.environ["HF_SPACE_ID"]
          api.pause_space(repo_id=space_id)
          deadline = time.monotonic() + 300
          last_stage = "unknown"
          while time.monotonic() < deadline:
              runtime = api.get_space_runtime(repo_id=space_id)
              last_stage = str(getattr(runtime.stage, "value", runtime.stage))
              print(f"pause stage={last_stage}")
              if "PAUSED" in last_stage.upper():
                  print(f"Space {space_id} is paused after rollback failure")
                  break
              time.sleep(10)
          else:
              raise SystemExit(f"Space pause could not be verified; last stage={last_stage}")
          PY
