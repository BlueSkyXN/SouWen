# =============================================================================
# Nuitka 构建工作流 — 将 SouWen 编译为原生机器码
#
# 触发条件:
#   - release-candidate reusable workflow 调用
#   - 推送标准 v* 版本标签时构建 artifact（不创建 Release）
#   - 手动触发（可选择构建层级和平台）
#
# 构建产物（三档 CLI edition）:
#   - basic-cli: 零 Key / 最小依赖 CLI，保留 MCP client/stdio，裁剪 API server、LLM 和重型抓取模块
#   - pro-cli: 默认产品 CLI，包含 server/API/MCP 入口但不自启动服务
#   - full-cli: 完整核心 CLI，包含 edition-full 核心重型能力；浏览器互斥栈走专项 gate
#
# Nuitka 编译为原生机器码，启动更快、运行性能更好
# 支持平台: Linux (amd64/arm64)、macOS (arm64)、Windows (amd64)
# =============================================================================
name: Build with Nuitka

on:
  workflow_call:
    inputs:
      candidate_sha:
        description: '要构建的 40 位候选提交 SHA'
        required: true
        type: string
      build_tier:
        description: '构建层级'
        required: false
        default: all
        type: string
      platforms:
        description: '目标平台'
        required: false
        default: all
        type: string
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_tier:
        description: '构建层级'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - basic-cli
          - pro-cli
          - full-cli
          - cli      # legacy alias for basic-cli
          - server   # legacy alias for pro-cli
          - full     # legacy alias for full-cli
      platforms:
        description: '目标平台'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - linux-only
          - macos-only
          - windows-only

env:
  APP_NAME: souwen
  PYTHON_VERSION: '3.11'

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # 动态生成构建矩阵
  # ---------------------------------------------------------------------------
  prepare:
    name: 准备构建矩阵
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      need_panel: ${{ steps.set-matrix.outputs.need_panel }}
    steps:
      - name: 生成矩阵
        id: set-matrix
        run: |
          TIER="${{ inputs.build_tier || 'all' }}"
          PLATFORM="${{ inputs.platforms || 'all' }}"
          case "$TIER" in
            cli) TIER="basic-cli" ;;
            server) TIER="pro-cli" ;;
            full) TIER="full-cli" ;;
          esac

          LINUX_AMD='{"os":"ubuntu-24.04","arch":"linux-amd64"}'
          LINUX_ARM='{"os":"ubuntu-24.04-arm","arch":"linux-arm64"}'
          MACOS='{"os":"macos-15","arch":"macos-arm64"}'
          WINDOWS='{"os":"windows-2025","arch":"windows-amd64"}'

          case "$PLATFORM" in
            linux-only) PLATFORMS="[$LINUX_AMD,$LINUX_ARM]" ;;
            macos-only) PLATFORMS="[$MACOS]" ;;
            windows-only) PLATFORMS="[$WINDOWS]" ;;
            *) PLATFORMS="[$LINUX_AMD,$LINUX_ARM,$MACOS,$WINDOWS]" ;;
          esac

          INCLUDES="[]"
          for PLAT in $(echo "$PLATFORMS" | jq -c '.[]'); do
            OS=$(echo "$PLAT" | jq -r '.os')
            ARCH=$(echo "$PLAT" | jq -r '.arch')
            EXT=""
            if echo "$ARCH" | grep -q "windows"; then EXT=".exe"; fi

            if [ "$TIER" = "all" ] || [ "$TIER" = "basic-cli" ]; then
              INCLUDES=$(echo "$INCLUDES" | jq -c ". + [{\"os\":\"$OS\",\"build_type\":\"basic-cli\",\"edition\":\"basic\",\"install_extra\":\"edition-basic\",\"artifact_name\":\"souwen-nuitka-${ARCH}-basic-cli${EXT}\"}]")
            fi
            if [ "$TIER" = "all" ] || [ "$TIER" = "pro-cli" ]; then
              INCLUDES=$(echo "$INCLUDES" | jq -c ". + [{\"os\":\"$OS\",\"build_type\":\"pro-cli\",\"edition\":\"pro\",\"install_extra\":\"edition-pro\",\"artifact_name\":\"souwen-nuitka-${ARCH}-pro-cli${EXT}\"}]")
            fi
            if [ "$TIER" = "all" ] || [ "$TIER" = "full-cli" ]; then
              INCLUDES=$(echo "$INCLUDES" | jq -c ". + [{\"os\":\"$OS\",\"build_type\":\"full-cli\",\"edition\":\"full\",\"install_extra\":\"edition-full\",\"artifact_name\":\"souwen-nuitka-${ARCH}-full-cli${EXT}\"}]")
            fi
          done

          echo "matrix={\"include\":$INCLUDES}" >> "$GITHUB_OUTPUT"
          if [ "$TIER" = "all" ] || [ "$TIER" = "pro-cli" ] || [ "$TIER" = "full-cli" ]; then
            echo "need_panel=true" >> "$GITHUB_OUTPUT"
          else
            echo "need_panel=false" >> "$GITHUB_OUTPUT"
          fi

  # ---------------------------------------------------------------------------
  # Panel 产物检查（仅 pro/full CLI 需要）
  # ---------------------------------------------------------------------------
  panel-check:
    name: Panel 产物检查
    needs: prepare
    if: needs.prepare.outputs.need_panel == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.candidate_sha || github.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: panel/package-lock.json

      - name: 构建 panel 并验证产物
        working-directory: panel
        run: |
          npm ci
          npm run build:local
          npm run check:artifact

      - name: Upload panel.html artifact
        uses: actions/upload-artifact@v7
        with:
          name: nuitka-panel-html
          path: src/souwen/server/panel.html
          retention-days: 1

  # ---------------------------------------------------------------------------
  # 构建
  # ---------------------------------------------------------------------------
  build:
    name: Build ${{ matrix.build_type }} on ${{ matrix.os }}
    needs: [prepare, panel-check]
    if: always() && needs.prepare.result == 'success' && (needs.panel-check.result == 'success' || needs.panel-check.result == 'skipped')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.candidate_sha || github.sha }}

      - name: Download panel.html
        if: needs.prepare.outputs.need_panel == 'true'
        uses: actions/download-artifact@v8
        with:
          name: nuitka-panel-html
          path: src/souwen/server/

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies (${{ matrix.build_type }})
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[${{ matrix.install_extra }}]"
          pip install nuitka ordered-set zstandard

      - name: Install MCP runtime required by basic CLI
        if: matrix.build_type == 'basic-cli'
        run: pip install -e ".[mcp]"

      - name: Install C compiler (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential patchelf

      - name: Install C compiler (macOS)
        if: runner.os == 'macOS'
        run: |
          xcode-select --install || true

      - name: Verify CLI
        env:
          PYTHONIOENCODING: utf-8
          SOUWEN_EDITION: ${{ matrix.edition }}
        run: |
          python cli.py --help
          python cli.py sources
          python cli.py doctor edition --json

      - name: Materialize immutable source provenance
        shell: bash
        run: printf '%s\n' '${{ inputs.candidate_sha || github.sha }}' > runtime.source.sha

      # --- Nuitka 编译 ---
      - name: Build with Nuitka (Unix - Full CLI)
        if: runner.os != 'Windows' && matrix.build_type == 'full-cli'
        run: |
          python -m nuitka \
            --onefile \
            --standalone \
            --assume-yes-for-downloads \
            --include-package=souwen \
            --include-package-data=souwen \
            --include-data-files=runtime.source.sha=runtime.source.sha \
            --include-package=superweb2pdf \
            --include-package-data=superweb2pdf \
            --include-distribution-metadata=superweb2pdf \
            --output-filename=${{ env.APP_NAME }} \
            --output-dir=dist \
            cli.py

      - name: Build with Nuitka (Unix - Pro CLI)
        if: runner.os != 'Windows' && matrix.build_type == 'pro-cli'
        run: |
          python -m nuitka \
            --onefile \
            --standalone \
            --assume-yes-for-downloads \
            --include-package=souwen \
            --include-package-data=souwen \
            --include-data-files=runtime.source.sha=runtime.source.sha \
            --nofollow-import-to=souwen.web.crawl4ai_fetcher \
            --nofollow-import-to=souwen.web.scrapling_fetcher \
            --nofollow-import-to=souwen.web.newspaper_fetcher \
            --nofollow-import-to=souwen.web.readability_fetcher \
            --nofollow-import-to=souwen.paper.arxiv_fulltext \
            --nofollow-import-to=pymupdf4llm \
            --nofollow-import-to=superweb2pdf \
            --output-filename=${{ env.APP_NAME }} \
            --output-dir=dist \
            cli.py

      - name: Build with Nuitka (Unix - Basic CLI)
        if: runner.os != 'Windows' && matrix.build_type == 'basic-cli'
        run: |
          python -m nuitka \
            --onefile \
            --standalone \
            --assume-yes-for-downloads \
            --include-package=souwen \
            --include-package-data=souwen \
            --include-data-files=runtime.source.sha=runtime.source.sha \
            --include-package=mcp \
            --nofollow-import-to=souwen.server \
            --nofollow-import-to=souwen.llm \
            --nofollow-import-to=fastapi \
            --nofollow-import-to=souwen.web.crawl4ai_fetcher \
            --nofollow-import-to=souwen.web.scrapling_fetcher \
            --nofollow-import-to=souwen.web.newspaper_fetcher \
            --nofollow-import-to=souwen.web.readability_fetcher \
            --nofollow-import-to=souwen.paper.arxiv_fulltext \
            --nofollow-import-to=pymupdf4llm \
            --nofollow-import-to=superweb2pdf \
            --output-filename=${{ env.APP_NAME }} \
            --output-dir=dist \
            cli.py

      - name: Build with Nuitka (Windows - Full CLI)
        if: runner.os == 'Windows' && matrix.build_type == 'full-cli'
        run: |
          python -m nuitka --onefile --standalone --assume-yes-for-downloads --include-package=souwen --include-package-data=souwen --include-data-files=runtime.source.sha=runtime.source.sha --include-package=superweb2pdf --include-package-data=superweb2pdf --include-distribution-metadata=superweb2pdf --output-filename=${{ env.APP_NAME }}.exe --output-dir=dist cli.py

      - name: Build with Nuitka (Windows - Pro CLI)
        if: runner.os == 'Windows' && matrix.build_type == 'pro-cli'
        run: |
          python -m nuitka --onefile --standalone --assume-yes-for-downloads --include-package=souwen --include-package-data=souwen --include-data-files=runtime.source.sha=runtime.source.sha --nofollow-import-to=souwen.web.crawl4ai_fetcher --nofollow-import-to=souwen.web.scrapling_fetcher --nofollow-import-to=souwen.web.newspaper_fetcher --nofollow-import-to=souwen.web.readability_fetcher --nofollow-import-to=souwen.paper.arxiv_fulltext --nofollow-import-to=pymupdf4llm --nofollow-import-to=superweb2pdf --output-filename=${{ env.APP_NAME }}.exe --output-dir=dist cli.py

      - name: Build with Nuitka (Windows - Basic CLI)
        if: runner.os == 'Windows' && matrix.build_type == 'basic-cli'
        run: |
          python -m nuitka --onefile --standalone --assume-yes-for-downloads --include-package=souwen --include-package-data=souwen --include-data-files=runtime.source.sha=runtime.source.sha --include-package=mcp --nofollow-import-to=souwen.server --nofollow-import-to=souwen.llm --nofollow-import-to=fastapi --nofollow-import-to=souwen.web.crawl4ai_fetcher --nofollow-import-to=souwen.web.scrapling_fetcher --nofollow-import-to=souwen.web.newspaper_fetcher --nofollow-import-to=souwen.web.readability_fetcher --nofollow-import-to=souwen.paper.arxiv_fulltext --nofollow-import-to=pymupdf4llm --nofollow-import-to=superweb2pdf --output-filename=${{ env.APP_NAME }}.exe --output-dir=dist cli.py

      - name: Run target-native tier-aware binary smoke
        uses: ./.github/actions/binary-smoke
        with:
          binary: ${{ runner.os == 'Windows' && './dist/souwen.exe' || './dist/souwen' }}
          profile: ${{ matrix.build_type }}
          edition: ${{ matrix.edition }}
          builder: nuitka
          candidate-sha: ${{ inputs.candidate_sha || github.sha }}
          report-json: artifacts/nuitka-${{ matrix.artifact_name }}.json
          report-markdown: artifacts/nuitka-${{ matrix.artifact_name }}.md

      - name: Upload binary smoke report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: binary-smoke-nuitka-${{ matrix.artifact_name }}
          path: artifacts/
          if-no-files-found: warn
          retention-days: 30

      # --- 重命名并上传 ---
      - name: Rename artifact (Unix)
        if: runner.os != 'Windows'
        run: mv dist/${{ env.APP_NAME }} dist/${{ matrix.artifact_name }}

      - name: Rename artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Move-Item -Path "dist/${{ env.APP_NAME }}.exe" -Destination "dist/${{ matrix.artifact_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}
          retention-days: 30
