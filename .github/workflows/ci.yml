name: CI

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'panel/**'
      - 'pyproject.toml'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: 代码检查
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 安装 ruff
        run: pip install ruff

      - name: Ruff 语法检查
        run: ruff check src/ tests/

      - name: Ruff 格式检查
        run: ruff format --check src/ tests/

  test:
    name: 测试 (Python ${{ matrix.python }}, ${{ matrix.os }})
    needs: lint
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, python: '3.10' }
          - { os: ubuntu-latest, python: '3.11' }
          - { os: ubuntu-latest, python: '3.12' }
          - { os: ubuntu-latest, python: '3.13' }
          - { os: macos-latest, python: '3.11' }
          - { os: windows-latest, python: '3.11' }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: 运行测试
        if: '!(matrix.os == ''ubuntu-latest'' && matrix.python == ''3.12'')'
        run: pytest tests/ -v --tb=short

      - name: 运行测试（含覆盖率）
        if: matrix.os == 'ubuntu-latest' && matrix.python == '3.12'
        run: pytest tests/ --cov=souwen --cov-report=xml --cov-report=term

      - name: 上传覆盖率到 Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: 安装可选依赖（爬虫层）
        if: matrix.os == 'ubuntu-latest' && matrix.python == '3.11'
        run: pip install "curl-cffi>=0.14.0"

      - name: 验证全部导入
        if: matrix.os == 'ubuntu-latest' && matrix.python == '3.11'
        run: |
          python -c "
          from souwen.paper import (
              OpenAlexClient, SemanticScholarClient, CrossrefClient,
              ArxivClient, DblpClient, CoreClient, PubMedClient, UnpaywallClient,
          )
          from souwen.patent import (
              PatentsViewClient, PqaiClient, EpoOpsClient, UsptoOdpClient,
              TheLensClient, CnipaClient, PatSnapClient, GooglePatentsClient,
          )
          from souwen.web import (
              DuckDuckGoClient, YahooClient, BraveClient,
              GoogleClient, BingClient,
              SearXNGClient, TavilyClient, ExaClient, SerperClient, BraveApiClient,
              SerpApiClient, FirecrawlClient, PerplexityClient,
              LinkupClient, ScrapingDogClient,
              StartpageClient, BaiduClient, MojeekClient, YandexClient,
              WhoogleClient, WebsurfxClient,
              web_search,
          )
          from souwen.doctor import check_all
          print('全部 37 数据源 + doctor 导入成功 ✅')
          "

  server-test:
    name: 服务端测试
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖（含 server）
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,server]"

      - name: 运行服务端测试
        run: pytest tests/test_server.py -v --tb=short

  panel-build:
    name: Panel 构建检查
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: panel/package-lock.json

      - name: 安装依赖并验证产物同步
        working-directory: panel
        run: |
          npm ci
          npm run build
          npm run check:artifact
          test -z "$(git -C .. status --short --untracked-files=all -- src/souwen/server/panel.html)" || (echo "❌ src/souwen/server/panel.html 未提交最新构建产物" >&2 && git -C .. status --short --untracked-files=all -- src/souwen/server/panel.html >&2 && exit 1)

      - name: 显示 panel.html 信息
        run: |
          echo "✅ panel.html 大小: $(wc -c < src/souwen/server/panel.html) 字节"
