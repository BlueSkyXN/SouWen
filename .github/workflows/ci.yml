name: CI

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'panel/**'
      - 'scripts/_functional_common.py'
      - 'scripts/ci/**'
      - 'scripts/scrapling_functional_check.py'
      - 'scripts/crawl4ai_functional_check.py'
      - 'scripts/plugin_functional_check.py'
      - 'examples/minimal-plugin/**'
      - 'pyproject.toml'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: 代码检查
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 安装 ruff
        run: pip install ruff

      - name: Ruff 语法检查
        run: ruff check src/ tests/ scripts/_functional_common.py scripts/ci/run_profile.py scripts/scrapling_functional_check.py scripts/crawl4ai_functional_check.py scripts/plugin_functional_check.py

      - name: Ruff 格式检查
        run: ruff format --check src/ tests/ scripts/_functional_common.py scripts/ci/run_profile.py scripts/scrapling_functional_check.py scripts/crawl4ai_functional_check.py scripts/plugin_functional_check.py

  test:
    name: 测试 (Python ${{ matrix.python }}, ${{ matrix.os }})
    needs: lint
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, python: '3.10' }
          - { os: ubuntu-latest, python: '3.11' }
          - { os: ubuntu-latest, python: '3.12' }
          - { os: ubuntu-latest, python: '3.13' }
          - { os: macos-latest, python: '3.11' }
          - { os: windows-latest, python: '3.11' }
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: 运行测试
        if: '!(matrix.os == ''ubuntu-latest'' && matrix.python == ''3.12'')'
        run: pytest tests/ -v --tb=short

      - name: 运行测试（含覆盖率）
        if: matrix.os == 'ubuntu-latest' && matrix.python == '3.12'
        run: pytest tests/ --cov=souwen --cov-report=xml --cov-report=term

      - name: 上传覆盖率到 Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python == '3.12'
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: 安装可选依赖（爬虫层）
        if: matrix.os == 'ubuntu-latest' && matrix.python == '3.11'
        run: pip install "curl-cffi>=0.14.0"

      - name: 运行 full runtime profile
        if: matrix.os == 'ubuntu-latest' && matrix.python == '3.11'
        run: |
          mkdir -p artifacts
          python scripts/ci/run_profile.py \
            --profile full \
            --json-report artifacts/runtime-profile-full.json \
            --markdown-report artifacts/runtime-profile-full.md

      - name: 上传 full runtime profile 报告
        if: always() && matrix.os == 'ubuntu-latest' && matrix.python == '3.11'
        uses: actions/upload-artifact@v7
        with:
          name: runtime-profile-full-report
          path: artifacts/
          if-no-files-found: warn
          retention-days: 7

  plugin-test:
    name: 插件系统测试
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: 运行插件相关测试
        run: pytest tests/test_plugin.py tests/test_fetch_handlers.py -v --tb=short

  plugin-functional:
    name: 插件云端功能测试
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: plugin-functional-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装当前源码与示例插件
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install -e examples/minimal-plugin

      - name: 安装可选 web2pdf 插件
        run: pip install "superweb2pdf[capture]>=0.2.0" || echo "superweb2pdf package not available, recording WARN in report"
        continue-on-error: true

      - name: 运行插件专用功能测试
        run: |
          mkdir -p artifacts
          python scripts/plugin_functional_check.py \
            --mode fixture \
            --require-installed \
            --json-report artifacts/plugin-functional.json \
            --markdown-report artifacts/plugin-functional.md

      - name: 上传插件专项测试报告
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: plugin-functional-report
          path: artifacts/
          if-no-files-found: warn
          retention-days: 7

  server-test:
    name: 服务端测试
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖（含 server）
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,server]"

      - name: 运行服务端测试
        run: pytest tests/test_server -v --tb=short

  scrapling-functional:
    name: Scrapling 云端功能测试
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: scrapling-functional-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cache/ms-playwright
            ~/.cache/scrapling
          key: browser-${{ runner.os }}-py311-${{ hashFiles('pyproject.toml') }}

      - name: 安装当前源码与 Scrapling 运行时
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,server,scrapling]"
          scrapling install

      - name: 运行 Scrapling 专用功能测试
        run: |
          mkdir -p artifacts
          python scripts/scrapling_functional_check.py \
            --mode live \
            --browser \
            --json-report artifacts/scrapling-functional.json \
            --markdown-report artifacts/scrapling-functional.md

      - name: 上传 Scrapling 专项测试报告
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: scrapling-functional-report
          path: artifacts/
          if-no-files-found: warn
          retention-days: 7

  crawl4ai-functional:
    name: Crawl4AI 云端功能测试
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: crawl4ai-functional-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cache/ms-playwright
            ~/.cache/crawl4ai
            ~/.crawl4ai
          key: crawl4ai-browser-${{ runner.os }}-py311-${{ hashFiles('pyproject.toml') }}

      - name: 安装当前源码与 Crawl4AI 浏览器运行时
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,server,crawl4ai]"
          python -m playwright install --with-deps chromium

      - name: 运行 Crawl4AI 专用功能测试
        run: |
          mkdir -p artifacts
          python scripts/crawl4ai_functional_check.py \
            --mode fixture \
            --require-runtime \
            --json-report artifacts/crawl4ai-functional.json \
            --markdown-report artifacts/crawl4ai-functional.md

      - name: 上传 Crawl4AI 专项测试报告
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: crawl4ai-functional-report
          path: artifacts/
          if-no-files-found: warn
          retention-days: 7

  panel-build:
    name: Panel 构建检查
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: panel/package-lock.json

      - name: 安装 panel 依赖
        working-directory: panel
        run: npm ci

      - name: TypeScript 类型检查
        working-directory: panel
        run: npx tsc --noEmit

      - name: 前端单元测试
        working-directory: panel
        run: npx vitest run

      - name: 构建 panel 并验证产物
        working-directory: panel
        run: |
          npm run build:local
          npm run check:artifact

      - name: 显示 panel.html 信息
        run: |
          echo "✅ panel.html 大小: $(wc -c < src/souwen/server/panel.html) 字节"
