name: CI

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'panel/**'
      - 'pyproject.toml'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: 代码检查
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 安装 ruff
        run: pip install ruff

      - name: Ruff 语法检查
        run: ruff check src/ tests/

      - name: Ruff 格式检查
        run: ruff format --check src/ tests/

  test:
    name: 测试 (Python ${{ matrix.python }}, ${{ matrix.os }})
    needs: lint
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, python: '3.10' }
          - { os: ubuntu-latest, python: '3.11' }
          - { os: ubuntu-latest, python: '3.12' }
          - { os: ubuntu-latest, python: '3.13' }
          - { os: macos-latest, python: '3.11' }
          - { os: windows-latest, python: '3.11' }
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: 运行测试
        if: '!(matrix.os == ''ubuntu-latest'' && matrix.python == ''3.12'')'
        run: pytest tests/ -v --tb=short

      - name: 运行测试（含覆盖率）
        if: matrix.os == 'ubuntu-latest' && matrix.python == '3.12'
        run: pytest tests/ --cov=souwen --cov-report=xml --cov-report=term

      - name: 上传覆盖率到 Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python == '3.12'
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: 安装可选依赖（爬虫层）
        if: matrix.os == 'ubuntu-latest' && matrix.python == '3.11'
        run: pip install "curl-cffi>=0.14.0"

      - name: 验证全部导入
        if: matrix.os == 'ubuntu-latest' && matrix.python == '3.11'
        run: |
          python -c "
          from souwen.paper import (
              OpenAlexClient, SemanticScholarClient, CrossrefClient,
              ArxivClient, DblpClient, CoreClient, PubMedClient, UnpaywallClient,
          )
          from souwen.patent import (
              PatentsViewClient, PqaiClient, EpoOpsClient, UsptoOdpClient,
              TheLensClient, CnipaClient, PatSnapClient, GooglePatentsClient,
          )
          from souwen.web import (
              DuckDuckGoClient, YahooClient, BraveClient,
              GoogleClient, BingClient,
              SearXNGClient, TavilyClient, ExaClient, SerperClient, BraveApiClient,
              SerpApiClient, FirecrawlClient, PerplexityClient,
              LinkupClient, ScrapingDogClient,
              StartpageClient, BaiduClient, MojeekClient, YandexClient,
              WhoogleClient, WebsurfxClient,
              GitHubClient, StackOverflowClient, RedditClient, BilibiliClient,
              WikipediaClient, YouTubeClient, ZhihuClient, WeiboClient,
              BuiltinFetcherClient, JinaReaderClient,
              web_search, fetch_content,
          )
          from souwen.doctor import check_all
          print('全部数据源 + doctor 导入成功 ✅')
          "
          python -c "from souwen.plugin import discover_entrypoint_plugins, load_plugins; print('plugin OK')"
          python -c "from souwen.web.fetch import register_fetch_handler, get_fetch_handlers; print('fetch_handlers OK')"
          python -c "from souwen.registry.views import external_plugins; print('external_plugins OK')"

  plugin-test:
    name: 插件系统测试
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖（含 web2pdf 插件）
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,web2pdf]"

      - name: 运行插件相关测试
        run: pytest tests/test_plugin.py tests/test_fetch_handlers.py -v --tb=short

      - name: 验证 entry_point 插件发现
        run: |
          python -c "
          from souwen.plugin import discover_entrypoint_plugins
          loaded, errors = discover_entrypoint_plugins()
          assert 'superweb2pdf' in loaded, f'superweb2pdf not found in {loaded}'
          assert not errors, f'Plugin errors: {errors}'
          print(f'Plugin discovery OK: {loaded}')
          "

      - name: 安装并测试最小示例插件
        run: |
          pip install -e examples/minimal-plugin
          pytest examples/minimal-plugin/tests/ -v --tb=short

  server-test:
    name: 服务端测试
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖（含 server）
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,server]"

      - name: 运行服务端测试
        run: pytest tests/test_server -v --tb=short

  panel-build:
    name: Panel 构建检查
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: panel/package-lock.json

      - name: 安装 panel 依赖
        working-directory: panel
        run: npm ci

      - name: TypeScript 类型检查
        working-directory: panel
        run: npx tsc --noEmit

      - name: 前端单元测试
        working-directory: panel
        run: npx vitest run

      - name: 构建 panel 并验证产物
        working-directory: panel
        run: |
          npm run build:local
          npm run check:artifact

      - name: 显示 panel.html 信息
        run: |
          echo "✅ panel.html 大小: $(wc -c < src/souwen/server/panel.html) 字节"
