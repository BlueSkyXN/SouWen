name: V2 CI

on:
  workflow_call:
    inputs:
      candidate_sha:
        description: "要验证的 40 位候选提交 SHA"
        required: true
        type: string
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

concurrency:
  group: v2-ci-${{ inputs.candidate_sha || github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  bootstrap:
    name: v2 bootstrap checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PYTHONPATH: src
      SOUWEN_PLUGIN_AUTOLOAD: "0"
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.candidate_sha || github.sha }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: panel/package-lock.json

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check src tests scripts tools

      - name: Ruff format check
        run: ruff format --check src tests scripts tools

      - name: Source catalog legacy term gate
        run: python scripts/ci/check_no_legacy_terms.py

      - name: Registry and docs tests
        run: |
          pytest tests/registry/test_consistency.py tests/test_gen_docs.py -q
          python tools/gen_docs.py --check
          python tools/check_markdown_links.py

      - name: Import and wheel surface tests
        run: |
          pytest tests/test_import_surface.py -q
          ( cd panel && npm ci && npm run build:local )
          wheelhouse="$(mktemp -d)"
          python -m pip wheel . --no-deps --wheel-dir "$wheelhouse"
          WHEELHOUSE="$wheelhouse" python - <<'PY'
          import os
          import zipfile
          from pathlib import Path

          wheel = next(Path(os.environ["WHEELHOUSE"]).glob("souwen-*.whl"))
          with zipfile.ZipFile(wheel) as zf:
              names = set(zf.namelist())

          removed_prefixes = (
              "souwen/facade/",
              "souwen/fetch/",
              "souwen/scraper/",
              "souwen/archive/",
              "souwen/cn_tech/",
              "souwen/developer/",
              "souwen/knowledge/",
              "souwen/office/",
              "souwen/social/",
              "souwen/video/",
              "souwen/web/api/",
              "souwen/web/engines/",
              "souwen/web/self_hosted/",
          )
          removed_files = {
              "souwen/_parsing.py",
              "souwen/exceptions.py",
              "souwen/fingerprint.py",
              "souwen/http_client.py",
              "souwen/rate_limiter.py",
              "souwen/retry.py",
              "souwen/session_cache.py",
              "souwen/source_registry.py",
          }
          unexpected = sorted(
              name
              for name in names
              if name in removed_files or any(name.startswith(prefix) for prefix in removed_prefixes)
          )
          if unexpected:
              raise SystemExit("removed v1 import surface leaked into wheel: " + ", ".join(unexpected))

          required = {
              "souwen/search.py",
              "souwen/registry/meta.py",
              "souwen/registry/sources/__init__.py",
              "souwen/web/fetch.py",
              "souwen/web/wayback.py",
              "souwen/server/panel.html",
          }
          missing = sorted(required - names)
          if missing:
              raise SystemExit("required v2 import surface missing from wheel: " + ", ".join(missing))

          print(f"{wheel.name} import surface OK")
          PY

      - name: Registry baseline
        run: |
          python - <<'PY'
          from collections import Counter

          from souwen.registry import all_adapters, fetch_providers

          adapters_by_name = all_adapters()
          adapters = list(adapters_by_name.values())
          print("runtime_adapters", len(adapters))
          print("fetch_providers", len(fetch_providers()))
          for domain, count in sorted(Counter(adapter.domain for adapter in adapters).items()):
              print(f"{domain} {count}")
          PY

  matrix_tests:
    name: v2 pytest matrix (Python ${{ matrix.python }}, ${{ matrix.os }})
    needs: bootstrap
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    env:
      PYTHONPATH: src
      SOUWEN_PLUGIN_AUTOLOAD: "0"
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, python: "3.10" }
          - { os: ubuntu-latest, python: "3.11" }
          - { os: ubuntu-latest, python: "3.12" }
          - { os: ubuntu-latest, python: "3.13" }
          - { os: macos-latest, python: "3.11" }
          - { os: windows-latest, python: "3.11" }
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.candidate_sha || github.sha }}

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,edition-pro]"

      - name: Run tests
        if: '!(matrix.os == ''ubuntu-latest'' && matrix.python == ''3.12'')'
        run: pytest tests/ -v --tb=short

      - name: Run tests with coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python == '3.12'
        run: pytest tests/ --cov=souwen --cov-report=xml --cov-report=term --cov-fail-under=67

      - name: Upload coverage artifact
        if: always() && matrix.os == 'ubuntu-latest' && matrix.python == '3.12'
        uses: actions/upload-artifact@v7
        with:
          name: v2-coverage-report
          path: coverage.xml
          if-no-files-found: warn
          retention-days: 7

  server_profile:
    name: v2 pro-cli + basic-cli profile
    needs: bootstrap
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PYTHONPATH: src
      SOUWEN_PLUGIN_AUTOLOAD: "0"
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.candidate_sha || github.sha }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,edition-pro]"

      - name: Run pro-cli and basic-cli profiles
        run: |
          mkdir -p artifacts
          python scripts/ci/run_profile.py \
            --profile pro-cli \
            --profile basic-cli \
            --json-report artifacts/v2-pro-basic-profile.json \
            --markdown-report artifacts/v2-pro-basic-profile.md

      - name: Upload pro-cli and basic-cli profile report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: v2-pro-basic-profile-report
          path: artifacts/
          if-no-files-found: warn
          retention-days: 7

  full_profile:
    name: v2 full runtime profile
    needs: bootstrap
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PYTHONPATH: src
      SOUWEN_PLUGIN_AUTOLOAD: "0"
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.candidate_sha || github.sha }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,edition-full]"

      - name: Run full runtime profile
        run: |
          mkdir -p artifacts
          python scripts/ci/run_profile.py \
            --profile full-cli \
            --json-report artifacts/v2-full-profile.json \
            --markdown-report artifacts/v2-full-profile.md

      - name: Upload full profile report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: v2-full-profile-report
          path: artifacts/
          if-no-files-found: warn
          retention-days: 7

  plugin_profile:
    name: v2 plugin profile
    needs: bootstrap
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PYTHONPATH: src
      SOUWEN_PLUGIN_AUTOLOAD: "0"
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.candidate_sha || github.sha }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install source and example plugin
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install -e examples/minimal-plugin

      - name: Run plugin profile
        run: |
          mkdir -p artifacts
          python scripts/ci/run_profile.py \
            --profile plugin \
            --json-report artifacts/v2-plugin-profile.json \
            --markdown-report artifacts/v2-plugin-profile.md

      - name: Upload plugin profile report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: v2-plugin-profile-report
          path: artifacts/
          if-no-files-found: warn
          retention-days: 7

  panel_build:
    name: v2 panel build
    needs: bootstrap
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.candidate_sha || github.sha }}

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: panel/package-lock.json

      - name: Install panel dependencies
        working-directory: panel
        run: npm ci

      - name: Panel unit tests
        working-directory: panel
        run: npm test

      - name: Build panel artifact
        working-directory: panel
        run: |
          npm run build:local
          npm run check:artifact
          test -f ../src/souwen/server/panel.html

      - name: Upload panel artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: v2-panel-html
          path: src/souwen/server/panel.html
          if-no-files-found: warn
          retention-days: 7

  release_readiness_summary:
    name: V2 CI / v2 release readiness summary
    needs: [bootstrap, matrix_tests, server_profile, full_profile, plugin_profile, panel_build]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Summarize readiness gates
        env:
          BOOTSTRAP_RESULT: ${{ needs.bootstrap.result }}
          MATRIX_RESULT: ${{ needs.matrix_tests.result }}
          SERVER_RESULT: ${{ needs.server_profile.result }}
          FULL_RESULT: ${{ needs.full_profile.result }}
          PLUGIN_RESULT: ${{ needs.plugin_profile.result }}
          PANEL_RESULT: ${{ needs.panel_build.result }}
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## V2 release readiness

          | Gate | Result | Scope |
          |---|---|---|
          | Bootstrap / import / wheel surface | $BOOTSTRAP_RESULT | v2 import surface, docs, registry baseline |
          | Full pytest matrix | $MATRIX_RESULT | Python 3.10-3.13 on Ubuntu, plus macOS/Windows 3.11 |
          | pro-cli + basic-cli profile | $SERVER_RESULT | local API surface and CLI smoke |
          | full-cli runtime profile | $FULL_RESULT | edition-full source, doctor, plugin, fetch handler, and feature matrix surface |
          | Plugin profile | $PLUGIN_RESULT | example plugin install, contract tests, entry point discovery |
          | Panel build | $PANEL_RESULT | TypeScript, Vitest, single-file panel artifact |

          External smoke, HF Space deploy, and binary build remain outside
          automatic V2 CI. Run them manually or through tag/release workflows
          before cutting a release candidate tag.
          EOF

          for result in "$BOOTSTRAP_RESULT" "$MATRIX_RESULT" "$SERVER_RESULT" "$FULL_RESULT" "$PLUGIN_RESULT" "$PANEL_RESULT"; do
            if [ "$result" != "success" ]; then
              echo "V2 release readiness gate failed: $result" >&2
              exit 1
            fi
          done
