# =============================================================================
# PyInstaller 构建工作流 — 将 SouWen 打包为单文件可执行程序
#
# 触发条件:
#   - 推送版本标签时（0.x.x 格式，自动创建 Release）
#   - 手动触发（可选择构建层级和平台）
#
# 构建产物（三种层级）:
#   - CLI 版: 纯命令行搜索工具，体积最小
#   - Server 版: CLI + FastAPI 服务 + 内嵌前端面板
#   - Full 版: Server + MCP 集成 + 全部可选依赖
#
# 支持平台: Linux (amd64/arm64)、macOS (arm64)、Windows (amd64)
# =============================================================================
name: Build with PyInstaller

on:
  push:
    tags:
      - '[0-9]*'
  workflow_dispatch:
    inputs:
      build_tier:
        description: '构建层级'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - cli
          - server
          - full
      platforms:
        description: '目标平台'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - linux-only
          - macos-only
          - windows-only

env:
  APP_NAME: souwen
  PYTHON_VERSION: '3.11'

jobs:
  # ---------------------------------------------------------------------------
  # 动态生成构建矩阵
  # ---------------------------------------------------------------------------
  prepare:
    name: 准备构建矩阵
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      need_panel: ${{ steps.set-matrix.outputs.need_panel }}
    steps:
      - name: 生成矩阵
        id: set-matrix
        run: |
          # 确定构建层级
          TIER="${{ inputs.build_tier || 'all' }}"
          PLATFORM="${{ inputs.platforms || 'all' }}"

          # 基础平台定义
          LINUX_AMD='{"os":"ubuntu-24.04","arch":"linux-amd64"}'
          LINUX_ARM='{"os":"ubuntu-24.04-arm","arch":"linux-arm64"}'
          MACOS='{"os":"macos-15","arch":"macos-arm64"}'
          WINDOWS='{"os":"windows-2025","arch":"windows-amd64"}'

          # 根据平台选择过滤
          case "$PLATFORM" in
            linux-only) PLATFORMS="[$LINUX_AMD,$LINUX_ARM]" ;;
            macos-only) PLATFORMS="[$MACOS]" ;;
            windows-only) PLATFORMS="[$WINDOWS]" ;;
            *) PLATFORMS="[$LINUX_AMD,$LINUX_ARM,$MACOS,$WINDOWS]" ;;
          esac

          # 根据层级生成 include 列表
          INCLUDES="[]"
          for PLAT in $(echo "$PLATFORMS" | jq -c '.[]'); do
            OS=$(echo "$PLAT" | jq -r '.os')
            ARCH=$(echo "$PLAT" | jq -r '.arch')
            EXT=""
            if echo "$ARCH" | grep -q "windows"; then EXT=".exe"; fi

            if [ "$TIER" = "all" ] || [ "$TIER" = "cli" ]; then
              INCLUDES=$(echo "$INCLUDES" | jq -c ". + [{\"os\":\"$OS\",\"build_type\":\"cli\",\"artifact_name\":\"souwen-${ARCH}-cli${EXT}\"}]")
            fi
            if [ "$TIER" = "all" ] || [ "$TIER" = "server" ]; then
              INCLUDES=$(echo "$INCLUDES" | jq -c ". + [{\"os\":\"$OS\",\"build_type\":\"server\",\"artifact_name\":\"souwen-${ARCH}-server${EXT}\"}]")
            fi
            if [ "$TIER" = "all" ] || [ "$TIER" = "full" ]; then
              INCLUDES=$(echo "$INCLUDES" | jq -c ". + [{\"os\":\"$OS\",\"build_type\":\"full\",\"artifact_name\":\"souwen-${ARCH}-full${EXT}\"}]")
            fi
          done

          MATRIX="{\"include\":$INCLUDES}"
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

          # 如果包含 server 或 full 层级，需要 panel 检查
          if [ "$TIER" = "all" ] || [ "$TIER" = "server" ] || [ "$TIER" = "full" ]; then
            echo "need_panel=true" >> "$GITHUB_OUTPUT"
          else
            echo "need_panel=false" >> "$GITHUB_OUTPUT"
          fi

  # ---------------------------------------------------------------------------
  # Panel 产物检查（仅 server/full 层级需要）
  # ---------------------------------------------------------------------------
  panel-check:
    name: Panel 产物检查
    needs: prepare
    if: needs.prepare.outputs.need_panel == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: panel/package-lock.json

      - name: 构建 panel 并验证产物
        working-directory: panel
        run: |
          npm ci
          npm run build:local
          npm run check:artifact

      - name: 显示 panel.html 信息
        run: |
          echo "✅ panel.html 大小: $(wc -c < src/souwen/server/panel.html) 字节"

      - name: Upload panel.html artifact
        uses: actions/upload-artifact@v7
        with:
          name: panel-html
          path: src/souwen/server/panel.html
          retention-days: 1

  # ---------------------------------------------------------------------------
  # 构建
  # ---------------------------------------------------------------------------
  build:
    name: Build ${{ matrix.build_type }} on ${{ matrix.os }}
    needs: [prepare, panel-check]
    if: always() && needs.prepare.result == 'success' && (needs.panel-check.result == 'success' || needs.panel-check.result == 'skipped')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download panel.html
        if: needs.prepare.outputs.need_panel == 'true'
        uses: actions/download-artifact@v8
        with:
          name: panel-html
          path: src/souwen/server/

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies (CLI)
        if: matrix.build_type == 'cli'
        run: |
          python -m pip install --upgrade pip
          pip install .
          pip install "setuptools<82" pyinstaller

      - name: Install dependencies (Server)
        if: matrix.build_type == 'server'
        run: |
          python -m pip install --upgrade pip
          pip install ".[server,tls,web]"
          pip install "setuptools<82" pyinstaller

      - name: Install dependencies (Full)
        if: matrix.build_type == 'full'
        run: |
          python -m pip install --upgrade pip
          pip install ".[server,tls,web,scraper,newspaper,readability,pdf,mcp,web2pdf]"
          pip install "setuptools<82" pyinstaller

      - name: Verify CLI
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python cli.py --help
          python cli.py sources

      # --- PyInstaller 打包 ---
      - name: Build with PyInstaller (Unix - Full)
        if: runner.os != 'Windows' && matrix.build_type == 'full'
        run: |
          pyinstaller --onefile --clean --name ${{ env.APP_NAME }} \
            --paths src \
            --add-data "src/souwen/server/panel.html:souwen/server" \
            --hidden-import=souwen.server \
            --hidden-import=souwen.server.app \
            --hidden-import=souwen.server.routes \
            --hidden-import=souwen.integrations \
            --hidden-import=souwen.integrations.mcp_server \
            --collect-submodules=rich._unicode_data \
            cli.py

      - name: Build with PyInstaller (Unix - Server)
        if: runner.os != 'Windows' && matrix.build_type == 'server'
        run: |
          pyinstaller --onefile --clean --name ${{ env.APP_NAME }} \
            --paths src \
            --add-data "src/souwen/server/panel.html:souwen/server" \
            --hidden-import=souwen.server \
            --hidden-import=souwen.server.app \
            --hidden-import=souwen.server.routes \
            --exclude-module=souwen.integrations \
            --exclude-module=mcp \
            --collect-submodules=rich._unicode_data \
            cli.py

      - name: Build with PyInstaller (Unix - CLI)
        if: runner.os != 'Windows' && matrix.build_type == 'cli'
        run: |
          pyinstaller --onefile --clean --name ${{ env.APP_NAME }} \
            --paths src \
            --exclude-module=souwen.server \
            --exclude-module=souwen.integrations \
            --exclude-module=fastapi \
            --exclude-module=uvicorn \
            --exclude-module=mcp \
            --exclude-module=pkg_resources \
            --exclude-module=setuptools \
            --collect-submodules=rich._unicode_data \
            cli.py

      - name: Build with PyInstaller (Windows - Full)
        if: runner.os == 'Windows' && matrix.build_type == 'full'
        run: |
          pyinstaller --onefile --clean --name ${{ env.APP_NAME }} --paths src --add-data "src/souwen/server/panel.html;souwen/server" --hidden-import=souwen.server --hidden-import=souwen.server.app --hidden-import=souwen.server.routes --hidden-import=souwen.integrations --hidden-import=souwen.integrations.mcp_server --collect-submodules=rich._unicode_data cli.py

      - name: Build with PyInstaller (Windows - Server)
        if: runner.os == 'Windows' && matrix.build_type == 'server'
        run: |
          pyinstaller --onefile --clean --name ${{ env.APP_NAME }} --paths src --add-data "src/souwen/server/panel.html;souwen/server" --hidden-import=souwen.server --hidden-import=souwen.server.app --hidden-import=souwen.server.routes --exclude-module=souwen.integrations --exclude-module=mcp --collect-submodules=rich._unicode_data cli.py

      - name: Build with PyInstaller (Windows - CLI)
        if: runner.os == 'Windows' && matrix.build_type == 'cli'
        run: |
          pyinstaller --onefile --clean --name ${{ env.APP_NAME }} --paths src --exclude-module=souwen.server --exclude-module=souwen.integrations --exclude-module=fastapi --exclude-module=uvicorn --exclude-module=mcp --exclude-module=pkg_resources --exclude-module=setuptools --collect-submodules=rich._unicode_data cli.py

      - name: Verify bundled CLI (Unix)
        if: runner.os != 'Windows'
        env:
          PYTHONIOENCODING: utf-8
        run: |
          dist/${{ env.APP_NAME }} --help
          dist/${{ env.APP_NAME }} --version
          dist/${{ env.APP_NAME }} sources
          dist/${{ env.APP_NAME }} config show
          dist/${{ env.APP_NAME }} config backend

      - name: Verify bundled CLI (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          PYTHONIOENCODING: utf-8
        run: |
          ./dist/${{ env.APP_NAME }}.exe --help
          ./dist/${{ env.APP_NAME }}.exe --version
          ./dist/${{ env.APP_NAME }}.exe sources
          ./dist/${{ env.APP_NAME }}.exe config show
          ./dist/${{ env.APP_NAME }}.exe config backend

      # --- 重命名并上传构建产物 ---
      - name: Rename artifact (Unix)
        if: runner.os != 'Windows'
        run: mv dist/${{ env.APP_NAME }} dist/${{ matrix.artifact_name }}

      - name: Rename artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Move-Item -Path "dist/${{ env.APP_NAME }}.exe" -Destination "dist/${{ matrix.artifact_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Release（仅 tag 触发时）
  # ---------------------------------------------------------------------------
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/

      - name: Display artifacts
        run: find artifacts/ -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ env.APP_NAME }} ${{ github.ref_name }}
          body: |
            ## SouWen ${{ github.ref_name }}

            ### Downloads

            **完整版（Full — CLI + API Server + MCP 集成）：**
            - **Linux (x64)**: `souwen-linux-amd64-full`
            - **Linux (ARM64)**: `souwen-linux-arm64-full`
            - **macOS (Apple Silicon)**: `souwen-macos-arm64-full`
            - **Windows (x64)**: `souwen-windows-amd64-full.exe`

            **服务版（Server — CLI + API Server + 前端面板）：**
            - **Linux (x64)**: `souwen-linux-amd64-server`
            - **Linux (ARM64)**: `souwen-linux-arm64-server`
            - **macOS (Apple Silicon)**: `souwen-macos-arm64-server`
            - **Windows (x64)**: `souwen-windows-amd64-server.exe`

            **命令行版（CLI — 纯搜索工具，体积最小）：**
            - **Linux (x64)**: `souwen-linux-amd64-cli`
            - **Linux (ARM64)**: `souwen-linux-arm64-cli`
            - **macOS (Apple Silicon)**: `souwen-macos-arm64-cli`
            - **Windows (x64)**: `souwen-windows-amd64-cli.exe`

            ### 使用
            ```bash
            chmod +x souwen-*           # Unix
            ./souwen-linux-amd64-full search paper "transformer"
            ./souwen-linux-amd64-server serve --port 8000
            ./souwen-linux-amd64-cli doctor
            ```

            ### 版本说明
            - **Full 版**：包含 FastAPI REST API 服务 + MCP Server 集成 + 全部可选依赖
            - **Server 版**：包含 CLI + FastAPI API 服务 + 内嵌前端面板
            - **CLI 版**：仅包含搜索命令行工具（search/fetch/sources/doctor），体积更小
          files: |
            artifacts/**/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
