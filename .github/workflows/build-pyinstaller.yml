# =============================================================================
# PyInstaller 构建工作流 — 将 SouWen 打包为单文件可执行程序
#
# 触发条件:
#   - release-candidate reusable workflow 调用
#   - 推送标准 v* 版本标签时构建 artifact（不创建 Release）
#   - 手动触发（可选择构建层级和平台）
#
# 构建产物（三档 CLI edition）:
#   - basic-cli: 零 Key / 最小依赖 CLI，保留 MCP client/stdio，裁剪 API server、LLM 和重型抓取模块
#   - pro-cli: 默认产品 CLI，包含 server/API/MCP 入口但不自启动服务
#   - full-cli: 完整核心 CLI，包含 edition-full 核心重型能力；浏览器互斥栈走专项 gate
#
# 支持平台: Linux (amd64/arm64)、macOS (arm64)、Windows (amd64)
# =============================================================================
name: Build with PyInstaller

on:
  workflow_call:
    inputs:
      candidate_sha:
        description: '要构建的 40 位候选提交 SHA'
        required: true
        type: string
      build_tier:
        description: '构建层级'
        required: false
        default: all
        type: string
      platforms:
        description: '目标平台'
        required: false
        default: all
        type: string
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_tier:
        description: '构建层级'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - basic-cli
          - pro-cli
          - full-cli
          - cli      # legacy alias for basic-cli
          - server   # legacy alias for pro-cli
          - full     # legacy alias for full-cli
      platforms:
        description: '目标平台'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - linux-only
          - macos-only
          - windows-only

env:
  APP_NAME: souwen
  PYTHON_VERSION: '3.11'

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # 动态生成构建矩阵
  # ---------------------------------------------------------------------------
  prepare:
    name: 准备构建矩阵
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      need_panel: ${{ steps.set-matrix.outputs.need_panel }}
    steps:
      - name: 生成矩阵
        id: set-matrix
        run: |
          TIER="${{ inputs.build_tier || 'all' }}"
          PLATFORM="${{ inputs.platforms || 'all' }}"
          case "$TIER" in
            cli) TIER="basic-cli" ;;
            server) TIER="pro-cli" ;;
            full) TIER="full-cli" ;;
          esac

          # 基础平台定义
          LINUX_AMD='{"os":"ubuntu-24.04","arch":"linux-amd64"}'
          LINUX_ARM='{"os":"ubuntu-24.04-arm","arch":"linux-arm64"}'
          MACOS='{"os":"macos-15","arch":"macos-arm64"}'
          WINDOWS='{"os":"windows-2025","arch":"windows-amd64"}'

          # 根据平台选择过滤
          case "$PLATFORM" in
            linux-only) PLATFORMS="[$LINUX_AMD,$LINUX_ARM]" ;;
            macos-only) PLATFORMS="[$MACOS]" ;;
            windows-only) PLATFORMS="[$WINDOWS]" ;;
            *) PLATFORMS="[$LINUX_AMD,$LINUX_ARM,$MACOS,$WINDOWS]" ;;
          esac

          # 根据层级生成 include 列表
          INCLUDES="[]"
          for PLAT in $(echo "$PLATFORMS" | jq -c '.[]'); do
            OS=$(echo "$PLAT" | jq -r '.os')
            ARCH=$(echo "$PLAT" | jq -r '.arch')
            EXT=""
            if echo "$ARCH" | grep -q "windows"; then EXT=".exe"; fi

            if [ "$TIER" = "all" ] || [ "$TIER" = "basic-cli" ]; then
              INCLUDES=$(echo "$INCLUDES" | jq -c ". + [{\"os\":\"$OS\",\"build_type\":\"basic-cli\",\"edition\":\"basic\",\"install_extra\":\"edition-basic\",\"artifact_name\":\"souwen-${ARCH}-basic-cli${EXT}\"}]")
            fi
            if [ "$TIER" = "all" ] || [ "$TIER" = "pro-cli" ]; then
              INCLUDES=$(echo "$INCLUDES" | jq -c ". + [{\"os\":\"$OS\",\"build_type\":\"pro-cli\",\"edition\":\"pro\",\"install_extra\":\"edition-pro\",\"artifact_name\":\"souwen-${ARCH}-pro-cli${EXT}\"}]")
            fi
            if [ "$TIER" = "all" ] || [ "$TIER" = "full-cli" ]; then
              INCLUDES=$(echo "$INCLUDES" | jq -c ". + [{\"os\":\"$OS\",\"build_type\":\"full-cli\",\"edition\":\"full\",\"install_extra\":\"edition-full\",\"artifact_name\":\"souwen-${ARCH}-full-cli${EXT}\"}]")
            fi
          done

          MATRIX="{\"include\":$INCLUDES}"
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

          # pro/full CLI binary includes the API server entry point and embedded panel.
          if [ "$TIER" = "all" ] || [ "$TIER" = "pro-cli" ] || [ "$TIER" = "full-cli" ]; then
            echo "need_panel=true" >> "$GITHUB_OUTPUT"
          else
            echo "need_panel=false" >> "$GITHUB_OUTPUT"
          fi

  # ---------------------------------------------------------------------------
  # Panel 产物检查（仅 pro/full CLI 需要）
  # ---------------------------------------------------------------------------
  panel-check:
    name: Panel 产物检查
    needs: prepare
    if: needs.prepare.outputs.need_panel == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.candidate_sha || github.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: panel/package-lock.json

      - name: 构建 panel 并验证产物
        working-directory: panel
        run: |
          npm ci
          npm run build:local
          npm run check:artifact

      - name: 显示 panel.html 信息
        run: |
          echo "✅ panel.html 大小: $(wc -c < src/souwen/server/panel.html) 字节"

      - name: Upload panel.html artifact
        uses: actions/upload-artifact@v7
        with:
          name: pyinstaller-panel-html
          path: src/souwen/server/panel.html
          retention-days: 1

  # ---------------------------------------------------------------------------
  # 构建
  # ---------------------------------------------------------------------------
  build:
    name: Build ${{ matrix.build_type }} on ${{ matrix.os }}
    needs: [prepare, panel-check]
    if: always() && needs.prepare.result == 'success' && (needs.panel-check.result == 'success' || needs.panel-check.result == 'skipped')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.candidate_sha || github.sha }}

      - name: Download panel.html
        if: needs.prepare.outputs.need_panel == 'true'
        uses: actions/download-artifact@v8
        with:
          name: pyinstaller-panel-html
          path: src/souwen/server/

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies (${{ matrix.build_type }})
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[${{ matrix.install_extra }}]"
          pip install "setuptools<82" pyinstaller

      - name: Install MCP runtime required by basic CLI
        if: matrix.build_type == 'basic-cli'
        run: pip install -e ".[mcp]"

      - name: Verify CLI
        env:
          PYTHONIOENCODING: utf-8
          SOUWEN_EDITION: ${{ matrix.edition }}
        run: |
          python cli.py --help
          python cli.py sources
          python cli.py doctor edition --json

      - name: Materialize immutable source provenance
        shell: bash
        run: printf '%s\n' '${{ inputs.candidate_sha || github.sha }}' > runtime.source.sha

      # --- PyInstaller 打包 ---
      - name: Build with PyInstaller (Unix - Full CLI)
        if: runner.os != 'Windows' && matrix.build_type == 'full-cli'
        run: |
          pyinstaller --onefile --clean --name ${{ env.APP_NAME }} \
            --paths src \
            --add-data "runtime.source.sha:." \
            --add-data "src/souwen/server/panel.html:souwen/server" \
            --hidden-import=souwen.server \
            --hidden-import=souwen.server.app \
            --hidden-import=souwen.server.routes \
            --hidden-import=souwen.integrations \
            --hidden-import=souwen.integrations.mcp_server \
            --hidden-import=superweb2pdf \
            --collect-submodules=superweb2pdf \
            --collect-data=superweb2pdf \
            --copy-metadata=superweb2pdf \
            --collect-submodules=souwen.registry.sources \
            --collect-submodules=rich._unicode_data \
            cli.py

      - name: Build with PyInstaller (Unix - Pro CLI)
        if: runner.os != 'Windows' && matrix.build_type == 'pro-cli'
        run: |
          pyinstaller --onefile --clean --name ${{ env.APP_NAME }} \
            --paths src \
            --add-data "runtime.source.sha:." \
            --add-data "src/souwen/server/panel.html:souwen/server" \
            --hidden-import=souwen.server \
            --hidden-import=souwen.server.app \
            --hidden-import=souwen.server.routes \
            --hidden-import=souwen.integrations \
            --hidden-import=souwen.integrations.mcp_server \
            --exclude-module=souwen.web.crawl4ai_fetcher \
            --exclude-module=souwen.web.scrapling_fetcher \
            --exclude-module=souwen.web.newspaper_fetcher \
            --exclude-module=souwen.web.readability_fetcher \
            --exclude-module=souwen.paper.arxiv_fulltext \
            --exclude-module=pymupdf4llm \
            --exclude-module=superweb2pdf \
            --collect-submodules=souwen.registry.sources \
            --collect-submodules=rich._unicode_data \
            cli.py

      - name: Build with PyInstaller (Unix - Basic CLI)
        if: runner.os != 'Windows' && matrix.build_type == 'basic-cli'
        run: |
          pyinstaller --onefile --clean --name ${{ env.APP_NAME }} \
            --paths src \
            --add-data "runtime.source.sha:." \
            --exclude-module=souwen.server \
            --exclude-module=souwen.llm \
            --exclude-module=fastapi \
            --exclude-module=souwen.web.crawl4ai_fetcher \
            --exclude-module=souwen.web.scrapling_fetcher \
            --exclude-module=souwen.web.newspaper_fetcher \
            --exclude-module=souwen.web.readability_fetcher \
            --exclude-module=souwen.paper.arxiv_fulltext \
            --exclude-module=pymupdf4llm \
            --exclude-module=superweb2pdf \
            --exclude-module=pkg_resources \
            --exclude-module=setuptools \
            --hidden-import=souwen.integrations.mcp_server \
            --collect-submodules=souwen.integrations.mcp \
            --collect-submodules=mcp \
            --collect-submodules=souwen.registry.sources \
            --collect-submodules=rich._unicode_data \
            cli.py

      - name: Build with PyInstaller (Windows - Full CLI)
        if: runner.os == 'Windows' && matrix.build_type == 'full-cli'
        run: |
          pyinstaller --onefile --clean --python-option "X utf8=1" --name ${{ env.APP_NAME }} --paths src --add-data "runtime.source.sha;." --add-data "src/souwen/server/panel.html;souwen/server" --hidden-import=souwen.server --hidden-import=souwen.server.app --hidden-import=souwen.server.routes --hidden-import=souwen.integrations --hidden-import=souwen.integrations.mcp_server --hidden-import=superweb2pdf --collect-submodules=superweb2pdf --collect-data=superweb2pdf --copy-metadata=superweb2pdf --collect-submodules=souwen.registry.sources --collect-submodules=rich._unicode_data cli.py

      - name: Build with PyInstaller (Windows - Pro CLI)
        if: runner.os == 'Windows' && matrix.build_type == 'pro-cli'
        run: |
          pyinstaller --onefile --clean --python-option "X utf8=1" --name ${{ env.APP_NAME }} --paths src --add-data "runtime.source.sha;." --add-data "src/souwen/server/panel.html;souwen/server" --hidden-import=souwen.server --hidden-import=souwen.server.app --hidden-import=souwen.server.routes --hidden-import=souwen.integrations --hidden-import=souwen.integrations.mcp_server --exclude-module=souwen.web.crawl4ai_fetcher --exclude-module=souwen.web.scrapling_fetcher --exclude-module=souwen.web.newspaper_fetcher --exclude-module=souwen.web.readability_fetcher --exclude-module=souwen.paper.arxiv_fulltext --exclude-module=pymupdf4llm --exclude-module=superweb2pdf --collect-submodules=souwen.registry.sources --collect-submodules=rich._unicode_data cli.py

      - name: Build with PyInstaller (Windows - Basic CLI)
        if: runner.os == 'Windows' && matrix.build_type == 'basic-cli'
        run: |
          pyinstaller --onefile --clean --python-option "X utf8=1" --name ${{ env.APP_NAME }} --paths src --add-data "runtime.source.sha;." --exclude-module=souwen.server --exclude-module=souwen.llm --exclude-module=fastapi --exclude-module=souwen.web.crawl4ai_fetcher --exclude-module=souwen.web.scrapling_fetcher --exclude-module=souwen.web.newspaper_fetcher --exclude-module=souwen.web.readability_fetcher --exclude-module=souwen.paper.arxiv_fulltext --exclude-module=pymupdf4llm --exclude-module=superweb2pdf --exclude-module=pkg_resources --exclude-module=setuptools --hidden-import=souwen.integrations.mcp_server --collect-submodules=souwen.integrations.mcp --collect-submodules=mcp --collect-submodules=souwen.registry.sources --collect-submodules=rich._unicode_data cli.py # gitleaks:allow -- false positive on module names

      - name: Run target-native tier-aware binary smoke
        uses: ./.github/actions/binary-smoke
        with:
          binary: ${{ runner.os == 'Windows' && './dist/souwen.exe' || './dist/souwen' }}
          profile: ${{ matrix.build_type }}
          edition: ${{ matrix.edition }}
          builder: pyinstaller
          candidate-sha: ${{ inputs.candidate_sha || github.sha }}
          report-json: artifacts/pyinstaller-${{ matrix.artifact_name }}.json
          report-markdown: artifacts/pyinstaller-${{ matrix.artifact_name }}.md

      - name: Upload binary smoke report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: binary-smoke-pyinstaller-${{ matrix.artifact_name }}
          path: artifacts/
          if-no-files-found: warn
          retention-days: 30

      # --- 重命名并上传构建产物 ---
      - name: Rename artifact (Unix)
        if: runner.os != 'Windows'
        run: mv dist/${{ env.APP_NAME }} dist/${{ matrix.artifact_name }}

      - name: Rename artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Move-Item -Path "dist/${{ env.APP_NAME }}.exe" -Destination "dist/${{ matrix.artifact_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}
          retention-days: 30
