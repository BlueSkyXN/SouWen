name: 发布到 PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    name: 构建并发布
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write  # PyPI trusted publisher
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: 'pip'

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: panel/package-lock.json

      - name: 构建 panel 并验证产物
        working-directory: panel
        run: |
          npm ci
          npm run build:local
          npm run check:artifact

      - name: 安装构建工具
        run: pip install build twine

      - name: 校验发布 ref 与 pyproject.toml 版本一致
        run: |
          case "$GITHUB_REF" in
            refs/tags/v*) ;;
            *)
              echo "❌ PyPI 发布必须从 v* tag 或该 tag 的 GitHub Release 触发；当前 ref=$GITHUB_REF" >&2
              exit 1
              ;;
          esac
          TAG="${GITHUB_REF_NAME#v}"
          VER="$(python3 - <<'PY'
          import tomllib
          with open("pyproject.toml", "rb") as file:
              print(tomllib.load(file)["project"]["version"])
          PY
          )"
          echo "tag=$TAG pyproject=$VER"
          if [ "$TAG" != "$VER" ]; then
            echo "❌ tag ($TAG) 与 pyproject.toml version ($VER) 不一致" >&2
            exit 1
          fi

      - name: 构建包
        run: python -m build

      - name: twine check dist/*
        run: twine check dist/*

      - name: 发布到 PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
