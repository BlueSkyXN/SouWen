name: 发布到 PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    name: 构建并发布
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write  # PyPI trusted publisher
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: panel/package-lock.json

      - name: 验证 panel 构建产物
        working-directory: panel
        run: |
          npm ci
          npm run build
          npm run check:artifact
          test -z "$(git -C .. status --short --untracked-files=all -- src/souwen/server/panel.html)" || (echo "❌ src/souwen/server/panel.html 未提交最新构建产物" >&2 && git -C .. status --short --untracked-files=all -- src/souwen/server/panel.html >&2 && exit 1)

      - name: 安装构建工具
        run: pip install build

      - name: 构建包
        run: python -m build

      - name: 发布到 PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
