name: 发布到 PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    name: 构建并发布
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write  # PyPI trusted publisher
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: 'pip'

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: panel/package-lock.json

      - name: 构建 panel 并验证产物
        working-directory: panel
        run: |
          npm ci
          npm run build:local
          npm run check:artifact

      - name: 安装构建工具
        run: pip install build twine

      - name: 构建包
        run: python -m build

      - name: twine check dist/*
        run: twine check dist/*

      - name: 校验 tag 与 pyproject.toml 版本一致
        if: github.event_name == 'release'
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VER=$(grep '^version = ' pyproject.toml | cut -d'"' -f2)
          echo "tag=$TAG pyproject=$VER"
          if [ "$TAG" != "$VER" ]; then
            echo "❌ tag ($TAG) 与 pyproject.toml version ($VER) 不一致" >&2
            exit 1
          fi

      - name: 发布到 PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
