name: AI Repo Audit
# Version: 1.1.2
#
# ═══════════════════════════════════════════════════════════════════════════
# AI Repo Audit — 全仓库手动审计 + 中文报告
# ═══════════════════════════════════════════════════════════════════════════
#
# 【功能简介】
# 仅 OWNER 手动触发。Codex 通读最近 N 天的提交、仓库结构、近期 PR，
# 找出过度修改 / 不当修改 / 错误修改 / 破坏性修改 / 冲突修改 / 安全问题 /
# 隐藏债共 7 类问题，按 severity_threshold 自动修复（dry_run=false 时），
# 最后输出一份中文 PR / Issue 报告。
#
# 【触发条件】
# 仅 workflow_dispatch — 非 OWNER 静默忽略。
# inputs:
# - lookback_days  审计窗口天数（默认 7）
# - effort         Codex reasoning effort（low/medium/high/xhigh）
# - severity_threshold  自动修复严重性下限（all/minor/major/critical）
# - dry_run        true=只生成报告 issue 不开 PR（默认 true，强烈推荐）
# - log_level      日志详细程度（quiet/normal/debug）
#
# 【审计模式】
# - sandbox=workspace-write，可改代码文件、跑测试。
# - Codex prompt 从 workflow_sha 物化，权威参数走 audit-meta.md。
# - dry_run=true 时即使 Codex 改了文件也会被丢弃，仅输出报告 issue。
#
# 【安全措施】
# - if: github.actor == github.repository_owner 严格门控
# - persist-credentials: true 用于 push（限于 codex-audit job）
# - 修复禁区：.github/workflows/、.github/prompts/、.ai-audit-context/、
#   构建产物、local/、公共 API 等（详见 prompt-file）
# - 提交前硬拦截 .github/workflows/ 与 .github/prompts/ 控制面变更
# - prompt 中明确标记 commit 内容、PR 描述、issue 内容为不可信来源
# - 报告长度有 60K 字符发布上限保护（超长自动压缩，失败时硬截断）
#
# 【工作流程】
# gate (5min) → collect-context (15min) → codex-audit (90min) → open-pr / notify-no-changes / notify-failure (5min)
#   │              │                         │                       │
#   │ 校验 OWNER    │ 收集 git/PR/结构上下文  │ 审计 + 修复 + 压缩    │ 创建 PR / Issue
#   │ 解析参数      │ 写 audit-meta.md        │                        │
#
# 【与 ai-review.yml / ai-agent.yml 的联动】
# 审计开 PR 后，ai-review.yml 会对该 PR 做评审；OWNER 可在 PR 上回复
# /ai-do 让 ai-agent.yml 进一步修复评审中发现的问题。三者形成
# review → audit → agent 闭环。
#
# 【依赖的 Secrets/Variables】
# - secrets.CUSTOM_AI_API_KEY — OpenAI/兼容 API 密钥
# - workflow_dispatch inputs.model — 手动指定模型，优先级最高
# - workflow_dispatch inputs.responses_endpoint — 手动指定 Responses API 端点，优先级最高
# - vars.CUSTOM_AI_RESPONSES_ENDPOINT — 可选，environment 级 AI API 端点 URL
# - secrets.CUSTOM_AI_RESPONSES_ENDPOINT — 可选，secret 级 AI API 端点 URL
# - secrets.AI_FIX_TOKEN (可选) — PAT，让 audit PR 触发 CI；缺省用 github.token
# - vars.CODEX_MODEL — 模型名（默认 gpt-5.4）
# - vars.CODEX_EFFORT — 推理强度（默认 xhigh）
# - vars.CODEX_ARGS — 可选，额外传给 codex exec；适合用 -c 覆盖 config.toml 项
# - environment: auto-ai — 需在 repo settings 中配置
#
# 注意：使用 GITHUB_TOKEN 推送的分支不会触发其它 workflow（CI 等）。
# 如需 audit PR 自动跑 CI，请在 secrets 或 auto-ai environment 配置 AI_FIX_TOKEN。
# ═══════════════════════════════════════════════════════════════════════════

on:
  workflow_dispatch:
    inputs:
      lookback_days:
        description: '重点审计最近多少天的提交（默认 7）'
        required: false
        default: '7'
        type: string
      model:
        description: '可选：覆盖 Codex 模型；留空则使用 environment 变量或默认值'
        required: false
        type: string
      responses_endpoint:
        description: '可选：覆盖 Responses API endpoint URL；留空则使用 environment 变量/secret 或 action 默认端点'
        required: false
        type: string
      effort:
        description: 'Codex reasoning effort'
        required: false
        default: xhigh
        type: choice
        options:
          - low
          - medium
          - high
          - xhigh
      severity_threshold:
        description: 'dry_run=false 时自动修复的最低严重性（默认仅报告）'
        required: false
        default: major
        type: choice
        options:
          - all
          - minor
          - major
          - critical
      dry_run:
        description: 'true=只生成报告 issue，不开修复 PR（推荐默认）'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      log_level:
        description: '日志详细程度（quiet=最少；normal=摘要；debug=完整诊断）'
        required: false
        default: quiet
        type: choice
        options:
          - quiet
          - normal
          - debug

concurrency:
  group: ai-repo-audit
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read
  checks: read

jobs:
  # ─────────────────────────────────────────────
  # Job 1: OWNER 校验 + 解析 inputs + 决定 audit branch
  # ─────────────────────────────────────────────
  gate:
    name: 验证权限与解析参数
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.actor == github.repository_owner

    outputs:
      lookback_days: ${{ steps.gate.outputs.lookback_days }}
      severity_threshold: ${{ steps.gate.outputs.severity_threshold }}
      dry_run: ${{ steps.gate.outputs.dry_run }}
      audit_branch: ${{ steps.gate.outputs.audit_branch }}
      audit_date: ${{ steps.gate.outputs.audit_date }}

    steps:
      - name: Resolve inputs
        id: gate
        run: |
          set -euo pipefail
          DAYS_RAW="${{ inputs.lookback_days }}"
          DAYS="${DAYS_RAW:-7}"
          # 数字校验，非数字回退到 7
          if ! [[ "$DAYS" =~ ^[0-9]+$ ]] || [ "$DAYS" -lt 1 ] || [ "$DAYS" -gt 365 ]; then
            echo "::warning::无效的 lookback_days='$DAYS_RAW'，回退为 7"
            DAYS=7
          fi
          DATE="$(date -u +%Y-%m-%d)"
          BRANCH="ai-audit/$DATE"

          {
            echo "lookback_days=$DAYS"
            echo "severity_threshold=${{ inputs.severity_threshold || 'major' }}"
            echo "dry_run=${{ inputs.dry_run || 'true' }}"
            echo "audit_branch=$BRANCH"
            echo "audit_date=$DATE"
          } >> "$GITHUB_OUTPUT"

          echo "::notice::AI Repo Audit lookback=${DAYS}d severity=${{ inputs.severity_threshold || 'major' }} dry_run=${{ inputs.dry_run || 'true' }} branch=$BRANCH"

  # ─────────────────────────────────────────────
  # Job 2: 收集仓库审计上下文（git log / 改动统计 / 仓库结构 / 近期 PR）
  # ─────────────────────────────────────────────
  collect-context:
    name: 收集审计上下文
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: gate

    permissions:
      contents: read
      pull-requests: read
      actions: read
      checks: read

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Prepare context directory
        run: mkdir -p .ai-audit-context

      - name: Collect git context
        env:
          LOOKBACK: ${{ needs.gate.outputs.lookback_days }}
          AUDIT_DATE: ${{ needs.gate.outputs.audit_date }}
        run: |
          set -uo pipefail

          # 最近 commit 列表（短）
          git log --since="${LOOKBACK} days ago" \
                  --pretty=format:'%h %ad %an %s' --date=short \
            > .ai-audit-context/recent-commits.txt || true

          # 最近改动文件按热度排序
          git log --since="${LOOKBACK} days ago" --name-only --pretty=format: \
            | sed '/^$/d' \
            | sort | uniq -c | sort -rn \
            > .ai-audit-context/recent-changed-files.txt || true

          # 最近 commit 的 stat 摘要
          git log --since="${LOOKBACK} days ago" \
                  --stat --pretty=format:'%n=== %h %ad %s ===' --date=short \
            > .ai-audit-context/recent-commits-stat.txt || true

          # commit 总数 / 涉及作者
          {
            echo "# 审计窗口元信息"
            echo
            echo "- 审计日期：${AUDIT_DATE}"
            echo "- 审计窗口：最近 ${LOOKBACK} 天"
            echo "- commit 数：$(git log --since="${LOOKBACK} days ago" --oneline | wc -l | tr -d ' ')"
            echo "- 改动文件去重数：$(git log --since="${LOOKBACK} days ago" --name-only --pretty=format: | sed '/^$/d' | sort -u | wc -l | tr -d ' ')"
            echo "- 涉及作者：$(git log --since="${LOOKBACK} days ago" --pretty=format:'%an' | sort -u | tr '\n' ',' | sed 's/,$//')"
          } > .ai-audit-context/window-meta.md

      - name: Collect repository overview
        run: |
          set -uo pipefail
          {
            echo "# 仓库结构概览"
            echo
            echo "## 顶层目录"
            find . -maxdepth 1 -mindepth 1 \
                   -not -path './.git' -not -path './node_modules' -not -path './.venv' \
                   -printf '%f\n' 2>/dev/null | sort | head -40
            echo
            echo "## src/souwen 子模块"
            find src/souwen -maxdepth 1 -mindepth 1 -type d -printf '%f\n' 2>/dev/null | sort
            echo
            echo "## panel/src 子目录"
            find panel/src -maxdepth 1 -mindepth 1 -type d -printf '%f\n' 2>/dev/null | sort
            echo
            echo "## tests 子目录"
            find tests -maxdepth 1 -mindepth 1 -type d -printf '%f\n' 2>/dev/null | sort
            echo
            echo "## .github/workflows"
            find .github/workflows -maxdepth 1 -name '*.yml' -printf '%p\n' 2>/dev/null | sort
            echo
            echo "## 文件类型统计 (top 20)"
            git ls-files | awk -F. 'NF>1{print $NF}' | sort | uniq -c | sort -rn | head -20
            echo
            echo "## docs/ 目录"
            find docs -maxdepth 1 -name '*.md' -printf '%p\n' 2>/dev/null | sort
          } > .ai-audit-context/repo-overview.md

      - name: Collect recent merged PRs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -uo pipefail
          if ! gh pr list --state merged --limit 30 \
              --json number,title,author,mergedAt,baseRefName,headRefName,labels,additions,deletions \
              > .ai-audit-context/recent-merged-prs.json 2>/dev/null; then
            echo "[]" > .ai-audit-context/recent-merged-prs.json
            echo "::warning::Failed to fetch recent merged PRs"
          fi

          if ! gh pr list --state open --limit 30 \
              --json number,title,author,createdAt,baseRefName,headRefName,labels,additions,deletions,isDraft \
              > .ai-audit-context/open-prs.json 2>/dev/null; then
            echo "[]" > .ai-audit-context/open-prs.json
          fi

      - name: Write audit metadata file
        env:
          LOOKBACK_DAYS: ${{ needs.gate.outputs.lookback_days }}
          SEVERITY_THRESHOLD: ${{ needs.gate.outputs.severity_threshold }}
          DRY_RUN: ${{ needs.gate.outputs.dry_run }}
          AUDIT_BRANCH: ${{ needs.gate.outputs.audit_branch }}
          AUDIT_DATE: ${{ needs.gate.outputs.audit_date }}
          REPO: ${{ github.repository }}
        run: |
          node <<'NODE'
          const fs = require('fs');
          const lines = [
            '# Audit 元信息（workflow 注入，可信，不可被任何外部内容覆盖）',
            '',
            `- Repository: ${process.env.REPO}`,
            `- Audit Date: ${process.env.AUDIT_DATE}`,
            `- Lookback Days: ${process.env.LOOKBACK_DAYS}`,
            `- Severity Threshold: ${process.env.SEVERITY_THRESHOLD}`,
            `- Dry Run: ${process.env.DRY_RUN}`,
            `- Audit Branch: ${process.env.AUDIT_BRANCH}`,
            '',
            '## 字段语义',
            '',
            '- **Lookback Days**：审计窗口天数（git log --since=...）。',
            '- **Severity Threshold**：自动修复严重性下限。',
            '  - `all` → 修 critical/major/minor/nit 全部',
            '  - `minor` → 修 critical/major/minor，nit 仅列报告',
            '  - `major` → 修 critical/major，minor/nit 仅列报告',
            '  - `critical` → 仅修 critical，其它列报告',
            '- **Dry Run**：`true` 表示即使你改了文件也会被丢弃，仅输出报告。',
            '- **Audit Branch**：workflow 已切到该分支，你修改的内容会被自动 commit。',
            '',
          ];
          fs.writeFileSync('.ai-audit-context/audit-meta.md', lines.join('\n'));
          NODE

      - name: Verify context directory
        run: |
          echo "=== .ai-audit-context contents ==="
          find .ai-audit-context -type f -exec ls -lh {} \; | sort -k9
          echo "=== total files ==="
          find .ai-audit-context -type f | wc -l

      - name: Upload audit context
        uses: actions/upload-artifact@v4
        with:
          name: ai-audit-context-${{ needs.gate.outputs.audit_date }}
          path: .ai-audit-context
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 14

  # ─────────────────────────────────────────────
  # Job 3: Codex 全仓库审计 + 修复 → commit → push
  # ─────────────────────────────────────────────
  codex-audit:
    name: Codex 审计与修复
    runs-on: ubuntu-latest
    timeout-minutes: 90
    environment:
      name: auto-ai
      deployment: false
    needs: [gate, collect-context]

    outputs:
      has_changes: ${{ steps.check-changes.outputs.has_changes }}
      audit_summary: ${{ steps.prepare-summary.outputs.final_summary }}

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true
          token: ${{ secrets.AI_FIX_TOKEN || github.token }}

      - name: Download audit context
        uses: actions/download-artifact@v4
        with:
          name: ai-audit-context-${{ needs.gate.outputs.audit_date }}
          path: .ai-audit-context

      - name: Create audit branch
        env:
          AUDIT_BRANCH: ${{ needs.gate.outputs.audit_branch }}
        run: git checkout -B "$AUDIT_BRANCH"

      - name: Resolve AI audit log config
        id: log-config
        env:
          INPUT_LOG_LEVEL: ${{ inputs.log_level }}
          VAR_LOG_LEVEL: ${{ vars.AI_AUDIT_LOG_LEVEL }}
          VAR_RUST_LOG: ${{ vars.AI_AUDIT_RUST_LOG }}
        run: |
          set -euo pipefail
          LOG_LEVEL="${INPUT_LOG_LEVEL:-${VAR_LOG_LEVEL:-quiet}}"
          case "$LOG_LEVEL" in
            quiet|normal|debug) ;;
            *)
              echo "::warning::Invalid AI_AUDIT_LOG_LEVEL='$LOG_LEVEL', falling back to quiet"
              LOG_LEVEL="quiet"
              ;;
          esac

          if [ -n "${VAR_RUST_LOG:-}" ]; then
            RUST_LOG_VALUE="$VAR_RUST_LOG"
          elif [ "$LOG_LEVEL" = "debug" ]; then
            RUST_LOG_VALUE="info"
          else
            RUST_LOG_VALUE="warn"
          fi

          {
            echo "log_level=$LOG_LEVEL"
            echo "rust_log=$RUST_LOG_VALUE"
          } >> "$GITHUB_OUTPUT"

          echo "::notice::AI Audit log level: $LOG_LEVEL (RUST_LOG=$RUST_LOG_VALUE)"

      - name: Validate AI secrets
        env:
          CUSTOM_AI_API_KEY: ${{ secrets.CUSTOM_AI_API_KEY }}
          CUSTOM_AI_RESPONSES_ENDPOINT: ${{ inputs.responses_endpoint || vars.CUSTOM_AI_RESPONSES_ENDPOINT || secrets.CUSTOM_AI_RESPONSES_ENDPOINT }}
          LOG_LEVEL: ${{ steps.log-config.outputs.log_level }}
        run: |
          set -euo pipefail
          if [ -z "${CUSTOM_AI_API_KEY:-}" ]; then
            echo "::error::CUSTOM_AI_API_KEY is empty"
            exit 1
          fi
          if [ -n "${CUSTOM_AI_RESPONSES_ENDPOINT:-}" ]; then
            RESPONSES_ENDPOINT_STATUS="present"
          else
            RESPONSES_ENDPOINT_STATUS="action default"
          fi

          {
            echo "## AI Audit 凭据校验"
            echo
            echo "- CUSTOM_AI_API_KEY: present"
            echo "- Responses endpoint: $RESPONSES_ENDPOINT_STATUS"
            echo
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$LOG_LEVEL" = "debug" ]; then
            echo "CUSTOM_AI_API_KEY length: ${#CUSTOM_AI_API_KEY}"
            if [ -n "${CUSTOM_AI_RESPONSES_ENDPOINT:-}" ]; then
              echo "CUSTOM_AI_RESPONSES_ENDPOINT length: ${#CUSTOM_AI_RESPONSES_ENDPOINT}"
            else
              echo "CUSTOM_AI_RESPONSES_ENDPOINT: action default"
            fi
          else
            echo "AI secrets are present. Enable log_level=debug to print non-sensitive lengths."
          fi

      - name: Materialize trusted audit prompt
        env:
          WORKFLOW_SHA: ${{ github.workflow_sha || github.sha }}
        run: |
          set -euo pipefail
          mkdir -p .ai-audit-context
          git fetch --no-tags --depth=1 origin "$WORKFLOW_SHA"
          git show "$WORKFLOW_SHA:.github/prompts/ai-repo-audit.md" > .ai-audit-context/trusted-ai-repo-audit.md
          test -s .ai-audit-context/trusted-ai-repo-audit.md

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        id: install-python
        continue-on-error: true
        run: |
          LOG=".ai-audit-context/pip-install.log"
          pip install -e ".[dev]" > "$LOG" 2>&1
          PIP_EXIT=$?
          echo "$PIP_EXIT" > .ai-audit-context/pip-install.exitcode
          tail -30 "$LOG"
          exit 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: panel/package-lock.json

      - name: Install panel dependencies
        id: install-panel
        continue-on-error: true
        run: |
          LOG=".ai-audit-context/npm-install.log"
          ( cd panel && npm ci ) > "$LOG" 2>&1
          NPM_EXIT=$?
          echo "$NPM_EXIT" > .ai-audit-context/npm-install.exitcode
          tail -30 "$LOG"
          exit 0

      - name: Pre-Codex diagnostic
        env:
          LOG_LEVEL: ${{ steps.log-config.outputs.log_level }}
          MODEL: ${{ inputs.model || vars.CODEX_MODEL || 'gpt-5.4' }}
          INPUT_MODEL: ${{ inputs.model }}
          VAR_MODEL: ${{ vars.CODEX_MODEL }}
          INPUT_RESPONSES_ENDPOINT: ${{ inputs.responses_endpoint }}
          VAR_RESPONSES_ENDPOINT: ${{ vars.CUSTOM_AI_RESPONSES_ENDPOINT }}
          SECRET_RESPONSES_ENDPOINT: ${{ secrets.CUSTOM_AI_RESPONSES_ENDPOINT }}
          EFFORT: ${{ inputs.effort || vars.CODEX_EFFORT || 'xhigh' }}
          CODEX_ARGS: ${{ vars.CODEX_ARGS }}
          LOOKBACK: ${{ needs.gate.outputs.lookback_days }}
          SEVERITY: ${{ needs.gate.outputs.severity_threshold }}
          DRY_RUN: ${{ needs.gate.outputs.dry_run }}
          AUDIT_BRANCH: ${{ needs.gate.outputs.audit_branch }}
        run: |
          set -euo pipefail
          CONTEXT_SIZE="$(du -sh .ai-audit-context/ 2>/dev/null | awk '{print $1}' || echo 'missing')"
          CONTEXT_FILES="$(find .ai-audit-context -type f 2>/dev/null | wc -l | tr -d ' ')"
          if [ -n "${INPUT_MODEL:-}" ]; then
            MODEL_SOURCE="workflow_dispatch input"
          elif [ -n "${VAR_MODEL:-}" ]; then
            MODEL_SOURCE="environment variable"
          else
            MODEL_SOURCE="workflow default"
          fi
          if [ -n "${INPUT_RESPONSES_ENDPOINT:-}" ]; then
            RESPONSES_ENDPOINT_STATUS="configured (workflow_dispatch input)"
          elif [ -n "${VAR_RESPONSES_ENDPOINT:-}" ]; then
            RESPONSES_ENDPOINT_STATUS="configured (environment variable)"
          elif [ -n "${SECRET_RESPONSES_ENDPOINT:-}" ]; then
            RESPONSES_ENDPOINT_STATUS="configured (secret)"
          else
            RESPONSES_ENDPOINT_STATUS="action default"
          fi
          if [ -n "${CODEX_ARGS:-}" ]; then
            CODEX_ARGS_STATUS="configured"
          else
            CODEX_ARGS_STATUS="unset"
          fi

          {
            echo "## AI Audit 配置摘要"
            echo
            echo "| 字段 | 值 |"
            echo "|---|---|"
            echo "| Log level | \`$LOG_LEVEL\` |"
            echo "| Model | \`$MODEL\` |"
            echo "| Model source | \`$MODEL_SOURCE\` |"
            echo "| Effort | \`$EFFORT\` |"
            echo "| Responses endpoint | \`$RESPONSES_ENDPOINT_STATUS\` |"
            echo "| Codex args | \`$CODEX_ARGS_STATUS\` |"
            echo "| Sandbox | \`workspace-write\` |"
            echo "| Lookback | \`${LOOKBACK} days\` |"
            echo "| Severity | \`$SEVERITY\` |"
            echo "| Dry run | \`$DRY_RUN\` |"
            echo "| Audit branch | \`$AUDIT_BRANCH\` |"
            echo "| Context size | \`$CONTEXT_SIZE\` |"
            echo "| Context files | \`$CONTEXT_FILES\` |"
            echo
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$LOG_LEVEL" = "debug" ]; then
            echo "::group::Audit context"
            echo "=== Context directory size ==="
            du -sh .ai-audit-context/ 2>/dev/null || echo "(missing)"
            echo
            echo "=== File listing ==="
            find .ai-audit-context -type f -exec ls -lh {} \; | sort -k5 -h
            echo
            echo "=== Markdown / TXT line counts ==="
            wc -l .ai-audit-context/*.md .ai-audit-context/*.txt 2>/dev/null || true
            echo "::endgroup::"
          elif [ "$LOG_LEVEL" = "normal" ]; then
            echo "AI Audit context: $CONTEXT_FILES files, $CONTEXT_SIZE"
          else
            echo "AI Audit context summary written to job summary."
          fi
          echo "Codex start: $(date -u +%Y-%m-%dT%H:%M:%SZ)"

      - name: Run Codex audit
        id: run-codex
        env:
          RUST_LOG: ${{ steps.log-config.outputs.rust_log }}
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.CUSTOM_AI_API_KEY }}
          responses-api-endpoint: ${{ inputs.responses_endpoint || vars.CUSTOM_AI_RESPONSES_ENDPOINT || secrets.CUSTOM_AI_RESPONSES_ENDPOINT }}
          model: ${{ inputs.model || vars.CODEX_MODEL || 'gpt-5.4' }}
          effort: ${{ inputs.effort || vars.CODEX_EFFORT || 'xhigh' }}
          codex-args: ${{ vars.CODEX_ARGS }}
          sandbox: workspace-write
          safety-strategy: drop-sudo
          prompt-file: .ai-audit-context/trusted-ai-repo-audit.md

      - name: Post-Codex diagnostic
        if: always()
        env:
          CODEX_FINAL_MESSAGE: ${{ steps.run-codex.outputs.final-message }}
          LOG_LEVEL: ${{ steps.log-config.outputs.log_level }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          MSG_LEN=${#CODEX_FINAL_MESSAGE}
          echo "Codex end: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "final-message length: ${MSG_LEN:-0} chars"

          {
            echo "## AI Audit 结果摘要"
            echo
            echo "| 字段 | 值 |"
            echo "|---|---|"
            echo "| Codex output length | \`${MSG_LEN:-0}\` chars |"
            echo "| Workflow | [run]($RUN_URL) |"
            echo
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$MSG_LEN" -gt 0 ] 2>/dev/null; then
            if [ "$LOG_LEVEL" = "debug" ]; then
              echo "::group::Codex output preview"
              echo "${CODEX_FINAL_MESSAGE:0:300}..."
              echo "::endgroup::"
            fi
          else
            echo "::warning::No output from Codex (empty final-message)"
          fi

      - name: Check audit summary length
        id: summary-length
        if: always()
        env:
          CODEX_FINAL_MESSAGE: ${{ steps.run-codex.outputs.final-message }}
        run: |
          mkdir -p .ai-audit-context
          node <<'NODE'
          const fs = require('fs');
          const raw = process.env.CODEX_FINAL_MESSAGE || '';
          const maxLen = 60000;
          const tooLong = raw.length > maxLen;

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `too_long=${tooLong ? 'true' : 'false'}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `length=${raw.length}\n`);

          fs.appendFileSync(
            process.env.GITHUB_STEP_SUMMARY,
            [
              '## AI Audit 长度检查',
              '',
              '| 字段 | 值 |',
              '|---|---|',
              `| Raw audit length | \`${raw.length}\` chars |`,
              `| Needs condense | \`${tooLong}\` |`,
              '',
            ].join('\n')
          );

          if (!tooLong) {
            process.exit(0);
          }

          const prompt = [
            '你刚刚生成的 AI 仓库审计报告过长，不能直接发布到 PR / Issue body。',
            '',
            '请在不新增事实、不改变结论的前提下，把下面的审计报告压缩成一份可发布的 markdown。',
            '',
            '压缩要求：',
            '- 最终内容必须少于 60,000 个字符。',
            '- 保留所有 critical 与 major 严重性的条目（包括其备选方案表与采用方案理由）。',
            '- minor / nit 条目可以合并、缩短背景与重复描述，但不要删除条目。',
            '- 保留摘要、验证结果、未修复列表的结构。',
            '- 不要添加原报告中没有的新问题或新结论。',
            '',
            '原审计报告如下：',
            '----',
            raw,
          ].join('\n');

          fs.writeFileSync('.ai-audit-context/condense-prompt.md', prompt);
          NODE

      - name: Condense long Codex audit
        id: condense-codex
        if: always() && steps.summary-length.outputs.too_long == 'true'
        continue-on-error: true
        env:
          RUST_LOG: ${{ steps.log-config.outputs.rust_log }}
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.CUSTOM_AI_API_KEY }}
          responses-api-endpoint: ${{ inputs.responses_endpoint || vars.CUSTOM_AI_RESPONSES_ENDPOINT || secrets.CUSTOM_AI_RESPONSES_ENDPOINT }}
          model: ${{ inputs.model || vars.CODEX_MODEL || 'gpt-5.4' }}
          effort: ${{ inputs.effort || vars.CODEX_EFFORT || 'xhigh' }}
          codex-args: ${{ vars.CODEX_ARGS }}
          sandbox: read-only
          safety-strategy: read-only
          prompt-file: .ai-audit-context/condense-prompt.md

      - name: Prepare final audit summary
        id: prepare-summary
        if: always()
        env:
          RAW_SUMMARY: ${{ steps.run-codex.outputs.final-message }}
          CONDENSED_SUMMARY: ${{ steps.condense-codex.outputs.final-message }}
          WAS_CONDENSED: ${{ steps.summary-length.outputs.too_long }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          node <<'NODE'
          const fs = require('fs');
          const raw = process.env.RAW_SUMMARY || '';
          const condensed = process.env.CONDENSED_SUMMARY || '';
          const wasCondensed = process.env.WAS_CONDENSED === 'true';
          const hardMax = 60000;

          let finalSummary = wasCondensed && condensed.trim() ? condensed : raw;

          if (!finalSummary.trim()) {
            finalSummary = [
              '⚠️ AI 仓库审计未产生输出。',
              '',
              '可能原因：',
              '- AI API 服务暂时不可用（超时/502/522）',
              '- 上下文 token 超限（仓库过大或 lookback_days 过长）',
              '- Codex 异常退出（查看 workflow 日志中的 Post-Codex diagnostic）',
              '',
              `请查看 [workflow 日志](${process.env.RUN_URL}) 诊断详情。`,
              '',
              '可尝试缩短 lookback_days 后重新 dispatch。',
            ].join('\n');
          }

          if (finalSummary.length > hardMax) {
            const note = '\n\n_压缩后的审计报告仍超过发布安全长度，已保留前半部分。完整报告请看 workflow 日志或缩短 lookback_days 后重新运行。_';
            finalSummary = finalSummary.slice(0, hardMax - note.length) + note;
          }

          fs.appendFileSync(
            process.env.GITHUB_STEP_SUMMARY,
            [
              '## AI Audit 报告准备',
              '',
              '| 字段 | 值 |',
              '|---|---|',
              `| Was condensed | \`${wasCondensed}\` |`,
              `| Final report length | \`${finalSummary.length}\` chars |`,
              '',
            ].join('\n')
          );

          const delimiter = `audit_summary_${Date.now()}`;
          fs.appendFileSync(
            process.env.GITHUB_OUTPUT,
            `final_summary<<${delimiter}\n${finalSummary}\n${delimiter}\n`
          );
          NODE

      - name: Check for changes
        id: check-changes
        env:
          DRY_RUN: ${{ needs.gate.outputs.dry_run }}
        run: |
          set -uo pipefail
          rm -rf .ai-audit-context

          if [ "$DRY_RUN" = "true" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            # dry_run 模式即使有改动也不提交；丢弃
            git checkout -- . 2>/dev/null || true
            git clean -fd 2>/dev/null || true
            echo "Dry run mode — discarded any code changes."
            exit 0
          fi

          git add -A
          FORBIDDEN_CHANGES="$(git diff --cached --name-only -- .github/workflows .github/prompts || true)"
          if [ -n "$FORBIDDEN_CHANGES" ]; then
            echo "::error::AI Repo Audit is not allowed to modify AI control-plane files (.github/workflows/ or .github/prompts/)."
            echo "$FORBIDDEN_CHANGES"
            exit 1
          fi

          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "Codex did not produce any file changes."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected:"
            git diff --cached --stat
          fi

      - name: Commit and push
        if: steps.check-changes.outputs.has_changes == 'true'
        env:
          AUDIT_BRANCH: ${{ needs.gate.outputs.audit_branch }}
          AUDIT_DATE: ${{ needs.gate.outputs.audit_date }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          {
            echo "chore: AI 仓库自动审计修复 (${AUDIT_DATE})"
            echo
            echo "由 .github/workflows/ai-repo-audit.yml 自动生成。"
            echo "详见 PR 描述中的多备选方案分析与推荐理由。"
            echo
            echo "Co-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>"
          } > /tmp/audit-commit-msg.txt
          git commit -F /tmp/audit-commit-msg.txt
          git push --force-with-lease origin "HEAD:refs/heads/${AUDIT_BRANCH}"

  # ─────────────────────────────────────────────
  # Job 4: 创建/更新审计 PR（有改动时）
  # ─────────────────────────────────────────────
  open-pr:
    name: 创建审计 PR
    runs-on: ubuntu-latest
    needs: [gate, codex-audit]
    timeout-minutes: 5
    if: needs.codex-audit.outputs.has_changes == 'true'

    permissions:
      pull-requests: write
      issues: write

    steps:
      - name: Create or update audit PR
        uses: actions/github-script@v7
        env:
          AUDIT_BRANCH: ${{ needs.gate.outputs.audit_branch }}
          AUDIT_DATE: ${{ needs.gate.outputs.audit_date }}
          AUDIT_SUMMARY: ${{ needs.codex-audit.outputs.audit_summary }}
          LOOKBACK: ${{ needs.gate.outputs.lookback_days }}
          SEVERITY: ${{ needs.gate.outputs.severity_threshold }}
        with:
          github-token: ${{ secrets.AI_FIX_TOKEN || github.token }}
          script: |
            const marker = '<!-- ai-repo-audit -->';
            const branch = process.env.AUDIT_BRANCH;
            const date = process.env.AUDIT_DATE;
            const summary = process.env.AUDIT_SUMMARY || '_(Codex 未输出审计报告)_';
            const lookback = process.env.LOOKBACK;
            const severity = process.env.SEVERITY;

            const title = `🤖 AI 仓库审计 ${date}`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              marker,
              '',
              `> ⚠️ **此 PR 由 AI 自动生成**，请仔细审阅每条改动后再合并。`,
              `> 触发参数：lookback_days=${lookback}，severity_threshold=${severity}`,
              `>`,
              `> Workflow: ${runUrl}`,
              '',
              summary,
              '',
              '---',
              '',
              `如需重跑审计，请在 Actions 页面手动 dispatch \`AI 仓库审计\` workflow。`,
            ].join('\n');

            const { data: existing } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:${branch}`,
            });

            let prUrl;
            if (existing.length > 0) {
              const pr = existing[0];
              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                title,
                body,
              });
              prUrl = pr.html_url;
              core.notice(`Updated audit PR: ${prUrl}`);
            } else {
              const { data: newPr } = await github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                head: branch,
                base: 'main',
              });
              prUrl = newPr.html_url;
              core.notice(`Created audit PR: ${prUrl}`);

              // 给 PR 打 ai-audit label（自动创建 label，如不存在）
              try {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: newPr.number,
                  labels: ['ai-audit'],
                });
              } catch (err) {
                core.notice(`Failed to add label: ${err.message}`);
              }
            }

  # ─────────────────────────────────────────────
  # Job 5: 无改动但有报告时，开 issue 记录
  # ─────────────────────────────────────────────
  notify-no-changes:
    name: 无改动通知
    runs-on: ubuntu-latest
    needs: [gate, codex-audit]
    timeout-minutes: 5
    if: needs.codex-audit.outputs.has_changes == 'false'

    permissions:
      issues: write

    steps:
      - name: Open report issue
        uses: actions/github-script@v7
        env:
          AUDIT_DATE: ${{ needs.gate.outputs.audit_date }}
          AUDIT_SUMMARY: ${{ needs.codex-audit.outputs.audit_summary }}
          LOOKBACK: ${{ needs.gate.outputs.lookback_days }}
          DRY_RUN: ${{ needs.gate.outputs.dry_run }}
        with:
          github-token: ${{ github.token }}
          script: |
            const summary = (process.env.AUDIT_SUMMARY || '').trim();
            if (!summary) {
              core.notice('Codex 无输出，跳过 issue 创建。');
              return;
            }

            const date = process.env.AUDIT_DATE;
            const lookback = process.env.LOOKBACK;
            const dryRun = process.env.DRY_RUN === 'true';
            const titlePrefix = dryRun ? 'AI 仓库审计报告（dry run）' : 'AI 仓库审计报告（无代码修复）';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const body = [
              '<!-- ai-repo-audit-issue -->',
              '',
              `> 触发参数：lookback_days=${lookback}，dry_run=${dryRun}`,
              `> Workflow: ${runUrl}`,
              '',
              summary,
            ].join('\n');

            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🤖 ${titlePrefix} ${date}`,
              body,
            });

            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['ai-audit'],
              });
            } catch (err) {
              core.notice(`Failed to add label: ${err.message}`);
            }

            core.notice(`Audit report issue: ${issue.html_url}`);

  # ─────────────────────────────────────────────
  # Job 6: codex-audit 失败时通知
  # ─────────────────────────────────────────────
  notify-failure:
    name: 通知执行失败
    runs-on: ubuntu-latest
    needs: [gate, codex-audit]
    timeout-minutes: 5
    if: always() && needs.codex-audit.result == 'failure'

    permissions:
      issues: write

    steps:
      - name: Open failure issue
        uses: actions/github-script@v7
        env:
          AUDIT_DATE: ${{ needs.gate.outputs.audit_date }}
        with:
          github-token: ${{ github.token }}
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🤖 AI 仓库审计执行失败 ${process.env.AUDIT_DATE}`,
              body: [
                '<!-- ai-repo-audit-failure -->',
                '',
                `AI 仓库审计 workflow 在 codex-audit 阶段失败。请查看 workflow 日志诊断。`,
                '',
                `Workflow: ${runUrl}`,
              ].join('\n'),
              labels: ['ai-audit'],
            });
