name: panel-sync

on:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check panel.html sync
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          CHANGED=$(git diff --name-only "$BASE" "$HEAD")
          if echo "$CHANGED" | grep -q '^panel/src/'; then
            if ! echo "$CHANGED" | grep -q '^src/souwen/server/panel\.html$'; then
              echo "❌ panel/src/* 改动但未同步到 src/souwen/server/panel.html"
              echo ""
              echo "修复："
              echo "    cd panel && npm run build"
              echo "    git add src/souwen/server/panel.html && git commit --amend --no-edit"
              exit 1
            fi
            echo "✓ panel/src 改动已同步到 panel.html"
          else
            echo "ℹ️ 本 PR 未触碰 panel/src，跳过 sync 检查"
          fi
