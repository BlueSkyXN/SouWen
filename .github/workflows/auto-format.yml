name: Auto Format

on:
  pull_request:
    branches: [main]
    paths:
      - '**.py'
      - 'pyproject.toml'
      - '.github/workflows/auto-format.yml'
  workflow_dispatch:

concurrency:
  group: auto-format-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: write
  pull-requests: write

jobs:
  auto-format:
    name: 自动格式化
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # 仅处理同仓库 PR（fork PR 无写入权限，跳过）
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 安装 ruff
        run: pip install ruff

      - name: 运行 ruff check --fix（仅安全修复）
        run: ruff check --fix src/ tests/

      - name: 运行 ruff format
        run: ruff format src/ tests/

      - name: 提交格式化修复
        id: auto-commit
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "style: auto-format (ruff check --fix + ruff format)"
          commit_author: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
          file_pattern: "src/**/*.py tests/**/*.py"

      - name: 触发 CI 重新检查
        if: steps.auto-commit.outputs.changes_detected == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORMAT_REF: ${{ github.head_ref || github.ref_name }}
        run: |
          echo "🔄 格式化已修复，触发 CI 重新运行..."
          gh workflow run ci.yml --ref "$FORMAT_REF"

      - name: PR 评论通知
        if: steps.auto-commit.outputs.changes_detected == 'true' && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr comment "$PR_NUMBER" \
            --body "🤖 **Auto-format**: 已自动修复代码格式并提交，CI 已触发重新检查。"

      - name: 最终格式检查（Gate）
        run: ruff format --check src/ tests/
