name: AI PR Review
# Version: 1.2.0
#
# ═══════════════════════════════════════════════════════════════════════════
# AI PR Review — 自动化 Pull Request 代码评审工作流
# ═══════════════════════════════════════════════════════════════════════════
#
# 【功能简介】
# 当 PR 被打开/同步/重新打开时，或仓库 OWNER 手动触发时，自动对 PR 代码变更
# 进行 AI 驱动的代码评审。评审结果以 sticky comment 发布到 PR 上（更新而非重复发布）。
#
# 【触发条件】
# 1. pull_request (open/synchronize/reopened/ready_for_review) — 自动触发
#    - 忽略 docs/、local/、README 和 CHANGELOG 变更；.github/prompts/** 会触发评审
#    - Draft PR 和 Fork PR 自动跳过
# 2. workflow_dispatch — 手动触发
#    - 可指定 pr_number 直接评审某个 PR
#    - 可指定 target_branch 查找该分支关联的 open PR
#    - 仅仓库 OWNER 可手动触发；仅评审 base 为 main 的 PR
#    - 可调整 effort（low/medium/high/xhigh）和 run_local_checks
#
# 【评审模式】
# - Review 固定为 read-only：Codex 只读取 PR diff、checks/logs、本地检查结果并发表评论。
# - 代码修改必须由仓库 OWNER 通过 /ai-do 显式交给 ai-agent.yml 执行。
# - checkout 使用 PR head SHA，避免跨 job 期间 PR merge ref 消失导致失败。
#
# 【安全措施】
# - Fork PR 直接跳过（避免暴露 AI API key 和仓库 secrets）
# - Codex 不获取 GH_TOKEN（review 是纯只读操作，由 workflow 后续步骤发布评论）
# - persist-credentials: false 防止 git 凭据泄露
# - Codex prompt 从目标 PR base SHA 物化，不信任目标 PR 中的 prompt 文件
# - PR 内容在 prompt 中明确标记为不可信来源（防 prompt injection）
# - 评审内容有 45,000 字符上限保护（超长自动压缩）
#
# 【工作流程】
# resolve-pr (5min) → collect-review-context (20min) → codex-review (60min) → post-review-comment (5min)
#   │                    │                                │                        │
#   │ 定位目标PR         │ 收集checks/logs/本地测试       │ 只读AI评审 (+可选压缩) │ 发布sticky评论
#   │ 校验目标PR          │ 上传artifact                  │                        │
#
# 【与 ai-agent.yml 的联动】
# 评审评论底部包含提示: "回复 /ai-do [指令] 让 AI 修复"
# 当 OWNER 在 PR 上回复 /ai-do 时，ai-agent.yml 会接手执行修复。
#
# 【依赖的 Secrets/Variables】
# - secrets.CUSTOM_AI_API_KEY — OpenAI/兼容 API 密钥
# - workflow_dispatch inputs.model — 手动指定模型，优先级最高
# - workflow_dispatch inputs.responses_endpoint — 手动指定 Responses API 端点，优先级最高
# - vars.CUSTOM_AI_RESPONSES_ENDPOINT — 可选，environment 级 AI API 端点 URL
# - secrets.CUSTOM_AI_RESPONSES_ENDPOINT — 可选，secret 级 AI API 端点 URL
# - vars.CODEX_MODEL — 模型名（默认 gpt-5.4）
# - vars.CODEX_EFFORT — 推理强度（默认 xhigh）
# - vars.CODEX_ARGS — 可选，额外传给 codex exec；适合用 -c 覆盖 config.toml 项
# ═══════════════════════════════════════════════════════════════════════════

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'local/**'
      - 'README.md'
      - 'README.en.md'
      - 'CHANGELOG.md'
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      target_branch:
        description: '要评审的 PR head 分支；留空则使用手动运行时选择的分支'
        required: false
        type: string
      pr_number:
        description: '可选：直接指定 PR number；填写后优先于 target_branch'
        required: false
        type: string
      model:
        description: '可选：覆盖 Codex 模型；留空则使用 environment 变量或默认值'
        required: false
        type: string
      responses_endpoint:
        description: '可选：覆盖 Responses API endpoint URL；留空则使用 environment 变量/secret 或 action 默认端点'
        required: false
        type: string
      effort:
        description: 'Codex reasoning effort'
        required: false
        default: xhigh
        type: choice
        options:
          - low
          - medium
          - high
          - xhigh
      log_level:
        description: '日志详细程度（quiet=最少；normal=摘要；debug=完整诊断）'
        required: false
        default: quiet
        type: choice
        options:
          - quiet
          - normal
          - debug
      run_local_checks:
        description: '是否运行 ruff/pytest/panel checks 并把日志带给 AI（PR 触发默认开启）'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

concurrency:
  group: ai-pr-review-${{ github.event.pull_request.number || inputs.pr_number || inputs.target_branch || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read
  checks: read
  pull-requests: read
  issues: read

jobs:
  resolve-pr:
    name: 定位目标 PR
    runs-on: ubuntu-latest
    timeout-minutes: 5

    outputs:
      should_review: ${{ steps.resolve.outputs.should_review }}
      skip_reason: ${{ steps.resolve.outputs.skip_reason }}
      pr_number: ${{ steps.resolve.outputs.pr_number }}
      base_ref: ${{ steps.resolve.outputs.base_ref }}
      base_sha: ${{ steps.resolve.outputs.base_sha }}
      head_ref: ${{ steps.resolve.outputs.head_ref }}
      head_sha: ${{ steps.resolve.outputs.head_sha }}
      title: ${{ steps.resolve.outputs.title }}
      body: ${{ steps.resolve.outputs.body }}
      html_url: ${{ steps.resolve.outputs.html_url }}

    steps:
      - name: Resolve pull request
        id: resolve
        uses: actions/github-script@v7
        env:
          TARGET_BRANCH: ${{ inputs.target_branch }}
          PR_NUMBER_INPUT: ${{ inputs.pr_number }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
          REPO_OWNER: ${{ github.repository_owner }}
          ACTOR: ${{ github.actor }}
        with:
          github-token: ${{ github.token }}
          script: |
            const fullRepo = `${context.repo.owner}/${context.repo.repo}`;
            const isPullRequestEvent = context.eventName === 'pull_request';

            let pr;
            let shouldReview = true;
            let skipReason = '';

            if (isPullRequestEvent) {
              pr = context.payload.pull_request;
              if (pr.draft) {
                shouldReview = false;
                skipReason = '跳过 draft PR。';
              } else if (pr.head.repo.full_name !== fullRepo) {
                shouldReview = false;
                skipReason = '跳过 fork PR，避免暴露 AI API key。';
              }
            } else {
              if (process.env.ACTOR !== process.env.REPO_OWNER) {
                throw new Error('只有 repository owner 可以手动触发 AI Review，避免自定义 endpoint 或手动目标解析暴露 AI secrets。');
              }

              const prNumberInput = (process.env.PR_NUMBER_INPUT || '').trim();
              const targetBranchInput = (process.env.TARGET_BRANCH || '').trim();
              const selectedBranch = process.env.REF_TYPE === 'branch'
                ? (process.env.REF_NAME || '').trim()
                : '';

              if (prNumberInput) {
                const prNumber = Number.parseInt(prNumberInput, 10);
                if (!Number.isInteger(prNumber) || prNumber <= 0) {
                  throw new Error(`无效的 pr_number: ${prNumberInput}`);
                }

                const { data } = await github.rest.pulls.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber,
                });
                pr = data;
              } else {
                const targetBranch = targetBranchInput || selectedBranch;
                if (!targetBranch) {
                  throw new Error('未指定 target_branch，且手动运行时选择的 ref 不是分支。');
                }

                const { data: pulls } = await github.rest.pulls.list({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  state: 'open',
                  head: `${context.repo.owner}:${targetBranch}`,
                  sort: 'updated',
                  direction: 'desc',
                  per_page: 1,
                });

                if (pulls.length === 0) {
                  throw new Error(`分支 ${targetBranch} 没有匹配的 open PR。`);
                }

                pr = pulls[0];
              }

              if (pr.state !== 'open') {
                shouldReview = false;
                skipReason = `跳过 PR #${pr.number}，当前状态是 ${pr.state}。`;
              } else if (pr.head.repo.full_name !== fullRepo) {
                shouldReview = false;
                skipReason = `跳过 PR #${pr.number}，它来自 fork (${pr.head.repo.full_name})。`;
              }
            }

            if (shouldReview && pr && pr.base.ref !== 'main') {
              shouldReview = false;
              skipReason = `跳过 PR #${pr.number}，base 分支是 ${pr.base.ref}，AI Review 只评审 base 为 main 的 PR。`;
            }

            core.setOutput('should_review', shouldReview ? 'true' : 'false');
            core.setOutput('skip_reason', skipReason);

            if (!pr) {
              core.notice(skipReason || '未找到可评审的 PR。');
              return;
            }

            core.setOutput('pr_number', String(pr.number));
            core.setOutput('base_ref', pr.base.ref);
            core.setOutput('base_sha', pr.base.sha);
            core.setOutput('head_ref', pr.head.ref);
            core.setOutput('head_sha', pr.head.sha);
            core.setOutput('title', pr.title || '');
            core.setOutput('body', pr.body || '');
            core.setOutput('html_url', pr.html_url || '');

            if (shouldReview) {
              core.notice(`AI Review target: #${pr.number} ${pr.head.ref} -> ${pr.base.ref} [mode=read-only]`);
            } else {
              core.notice(skipReason);
            }

  collect-review-context:
    name: 收集自动化上下文
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: resolve-pr
    if: needs.resolve-pr.outputs.should_review == 'true'

    permissions:
      contents: read
      actions: read
      checks: read

    steps:
      - name: Checkout PR head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-pr.outputs.head_sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Prepare context directory
        run: mkdir -p .ai-review-context

      - name: Write PR metadata file
        env:
          PR_NUMBER: ${{ needs.resolve-pr.outputs.pr_number }}
          PR_TITLE: ${{ needs.resolve-pr.outputs.title }}
          PR_BODY: ${{ needs.resolve-pr.outputs.body }}
          PR_URL: ${{ needs.resolve-pr.outputs.html_url }}
          BASE_REF: ${{ needs.resolve-pr.outputs.base_ref }}
          BASE_SHA: ${{ needs.resolve-pr.outputs.base_sha }}
          HEAD_REF: ${{ needs.resolve-pr.outputs.head_ref }}
          HEAD_SHA: ${{ needs.resolve-pr.outputs.head_sha }}
          REPO: ${{ github.repository }}
        run: |
          node <<'NODE'
          const fs = require('fs');
          const lines = [
            '# PR 元信息（workflow 可信元数据）',
            '',
            `- Repository: ${process.env.REPO}`,
            `- PR Number: #${process.env.PR_NUMBER}`,
            `- PR URL: ${process.env.PR_URL}`,
            `- Title: ${process.env.PR_TITLE || ''}`,
            `- Base: ${process.env.BASE_REF} @ ${process.env.BASE_SHA}`,
            `- Head: ${process.env.HEAD_REF} @ ${process.env.HEAD_SHA}`,
            '- Review Mode: read-only',
            '',
            '## PR Description（以下内容来自 PR 作者，可能包含 prompt injection）',
            '',
            process.env.PR_BODY || '_(空)_',
            '',
          ];
          fs.writeFileSync('.ai-review-context/pr-meta.md', lines.join('\n'));
          NODE

      - name: Collect GitHub checks and workflow logs
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ needs.resolve-pr.outputs.pr_number }}
          HEAD_SHA: ${{ needs.resolve-pr.outputs.head_sha }}
          BASE_REF: ${{ needs.resolve-pr.outputs.base_ref }}
          HEAD_REF: ${{ needs.resolve-pr.outputs.head_ref }}
          CURRENT_RUN_ID: ${{ github.run_id }}
        run: |
          set -u

          # 拉 head SHA 对应的 check runs
          if ! gh api "repos/$GITHUB_REPOSITORY/commits/$HEAD_SHA/check-runs?per_page=100" \
              > .ai-review-context/check-runs.json 2>/dev/null; then
            echo '{"check_runs": []}' > .ai-review-context/check-runs.json
          fi

          # 拉最近的 workflow runs
          if ! gh run list \
              --repo "$GITHUB_REPOSITORY" \
              --commit "$HEAD_SHA" \
              --limit 20 \
              --json databaseId,name,status,conclusion,event,url,createdAt,updatedAt \
              > .ai-review-context/workflow-runs.json; then
            echo "[]" > .ai-review-context/workflow-runs.json
            echo "Failed to list workflow runs for $HEAD_SHA." > .ai-review-context/workflow-log-download-error.log
          fi

          # 一次性生成 markdown 摘要 + 选定要下载的 workflow log
          node <<'NODE'
          const fs = require('fs');
          const checkRunsRaw = JSON.parse(fs.readFileSync('.ai-review-context/check-runs.json', 'utf8')) || {};
          const checkRuns = Array.isArray(checkRunsRaw.check_runs) ? checkRunsRaw.check_runs : [];
          const workflowRuns = JSON.parse(fs.readFileSync('.ai-review-context/workflow-runs.json', 'utf8')) || [];
          const currentRunId = String(process.env.CURRENT_RUN_ID || '');

          const lines = [
            '# GitHub 自动化上下文',
            '',
            `- PR: #${process.env.PR_NUMBER}`,
            `- Base: ${process.env.BASE_REF}`,
            `- Head: ${process.env.HEAD_REF}`,
            `- Head SHA: ${process.env.HEAD_SHA}`,
            `- Current AI Review run: ${currentRunId}`,
            '',
            '## Check Runs',
            '',
          ];

          if (checkRuns.length === 0) {
            lines.push('未找到该 head SHA 对应的 check runs。');
          } else {
            for (const run of checkRuns) {
              lines.push(`- ${run.name}: status=${run.status}, conclusion=${run.conclusion || 'pending'}, url=${run.html_url}`);
            }
          }

          lines.push('', '## Workflow Runs', '');
          if (workflowRuns.length === 0) {
            lines.push('未找到该 head SHA 对应的 workflow runs。');
          } else {
            for (const run of workflowRuns) {
              lines.push(`- ${run.name}: id=${run.databaseId}, status=${run.status}, conclusion=${run.conclusion || 'pending'}, event=${run.event}, url=${run.url}`);
            }
          }

          fs.writeFileSync('.ai-review-context/github-checks.md', `${lines.join('\n')}\n`);

          // 选最近 3 条已完成的 workflow run（排除当前 AI Review run）下载 log
          const selected = workflowRuns
            .filter((run) => String(run.databaseId) !== currentRunId)
            .filter((run) => run.status === 'completed')
            .slice(0, 3);

          fs.writeFileSync(
            '.ai-review-context/workflow-log-targets.txt',
            selected.map((run) => `${run.databaseId}\t${run.name}`).join('\n')
          );
          NODE

          # 下载选中的 workflow logs
          while IFS=$'\t' read -r run_id run_name; do
            [ -n "${run_id:-}" ] || continue
            safe_name="$(printf '%s' "$run_name" | tr -cs 'A-Za-z0-9._-' '-' | sed 's/^-//; s/-$//')"
            tmp_file="$(mktemp)"
            out_file=".ai-review-context/workflow-${run_id}-${safe_name}.log"

            if timeout 90 gh run view "$run_id" --repo "$GITHUB_REPOSITORY" --log > "$tmp_file" 2>&1; then
              if [ "$(wc -c < "$tmp_file")" -gt 200000 ]; then
                head -c 200000 "$tmp_file" > "$out_file"
                printf '\n\n[log truncated to 200000 bytes]\n' >> "$out_file"
              else
                cp "$tmp_file" "$out_file"
              fi
            else
              {
                echo "Failed to download workflow log for run $run_id ($run_name)."
                cat "$tmp_file"
              } > "$out_file"
            fi

            rm -f "$tmp_file"
          done < .ai-review-context/workflow-log-targets.txt

      - name: Set up Python for local checks
        if: github.event_name == 'pull_request' || inputs.run_local_checks == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Run Python local checks
        if: github.event_name == 'pull_request' || inputs.run_local_checks == 'true'
        continue-on-error: true
        run: |
          set +e
          CTX="$GITHUB_WORKSPACE/.ai-review-context/local-checks"
          mkdir -p "$CTX"

          {
            echo '$ python -m pip install --upgrade pip'
            python -m pip install --upgrade pip
            echo '$ pip install -e ".[dev]"'
            pip install -e ".[dev]"
          } > "$CTX/python-install.log" 2>&1
          echo "$?" > "$CTX/python-install.exitcode"

          {
            echo '$ ruff check src/ tests/'
            ruff check src/ tests/
          } > "$CTX/ruff-check.log" 2>&1
          echo "$?" > "$CTX/ruff-check.exitcode"

          {
            echo '$ ruff format --check src/ tests/'
            ruff format --check src/ tests/
          } > "$CTX/ruff-format.log" 2>&1
          echo "$?" > "$CTX/ruff-format.exitcode"

          {
            echo '$ pytest tests/ -v --tb=short'
            pytest tests/ -v --tb=short
          } > "$CTX/pytest.log" 2>&1
          echo "$?" > "$CTX/pytest.exitcode"

      - name: Set up Node.js for panel checks
        if: github.event_name == 'pull_request' || inputs.run_local_checks == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: panel/package-lock.json

      - name: Run panel local checks
        if: github.event_name == 'pull_request' || inputs.run_local_checks == 'true'
        continue-on-error: true
        run: |
          set +e
          CTX="$GITHUB_WORKSPACE/.ai-review-context/local-checks"
          mkdir -p "$CTX"

          # Use subshells ( ) so cd panel does NOT leak into parent shell
          (
            echo '$ npm ci'
            cd panel && npm ci
          ) > "$CTX/panel-install.log" 2>&1
          echo "$?" > "$CTX/panel-install.exitcode"

          (
            echo '$ npx tsc --noEmit'
            cd panel && npx tsc --noEmit
          ) > "$CTX/panel-tsc.log" 2>&1
          echo "$?" > "$CTX/panel-tsc.exitcode"

          (
            echo '$ npx vitest run'
            cd panel && npx vitest run
          ) > "$CTX/panel-vitest.log" 2>&1
          echo "$?" > "$CTX/panel-vitest.exitcode"

          (
            echo '$ npm run build:local'
            cd panel
            npm run build:local
            echo '$ npm run check:artifact'
            npm run check:artifact
          ) > "$CTX/panel-build.log" 2>&1
          echo "$?" > "$CTX/panel-build.exitcode"

      - name: Verify context directory
        run: |
          echo "=== .ai-review-context contents ==="
          find .ai-review-context -type f | head -30 || echo "Directory missing!"
          echo "=== total files ==="
          find .ai-review-context -type f | wc -l || echo "0"

      - name: Upload AI review context
        uses: actions/upload-artifact@v4
        with:
          name: ai-review-context-${{ needs.resolve-pr.outputs.pr_number }}
          path: .ai-review-context
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 7

  codex-review:
    name: Codex 代码评审
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment:
      name: auto-ai
      deployment: false
    needs: [resolve-pr, collect-review-context]
    if: needs.resolve-pr.outputs.should_review == 'true'

    permissions:
      contents: read
      actions: read
      checks: read
      pull-requests: read

    steps:
      - name: Checkout PR head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-pr.outputs.head_sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Fetch base and head refs
        env:
          PR_BASE_REF: ${{ needs.resolve-pr.outputs.base_ref }}
          PR_HEAD_REF: ${{ needs.resolve-pr.outputs.head_ref }}
          PR_HEAD_SHA: ${{ needs.resolve-pr.outputs.head_sha }}
        run: |
          git fetch --no-tags origin "$PR_BASE_REF:refs/remotes/origin/$PR_BASE_REF"
          git fetch --no-tags origin "$PR_HEAD_REF:refs/remotes/origin/$PR_HEAD_REF" || true
          git cat-file -e "$PR_HEAD_SHA^{commit}"

      - name: Download automation context
        uses: actions/download-artifact@v4
        with:
          name: ai-review-context-${{ needs.resolve-pr.outputs.pr_number }}
          path: .ai-review-context

      - name: Resolve AI review log config
        id: log-config
        env:
          INPUT_LOG_LEVEL: ${{ inputs.log_level }}
          VAR_LOG_LEVEL: ${{ vars.AI_REVIEW_LOG_LEVEL }}
          VAR_RUST_LOG: ${{ vars.AI_REVIEW_RUST_LOG }}
        run: |
          set -euo pipefail
          LOG_LEVEL="${INPUT_LOG_LEVEL:-${VAR_LOG_LEVEL:-quiet}}"
          case "$LOG_LEVEL" in
            quiet|normal|debug) ;;
            *)
              echo "::warning::Invalid AI_REVIEW_LOG_LEVEL='$LOG_LEVEL', falling back to quiet"
              LOG_LEVEL="quiet"
              ;;
          esac

          if [ -n "${VAR_RUST_LOG:-}" ]; then
            RUST_LOG_VALUE="$VAR_RUST_LOG"
          elif [ "$LOG_LEVEL" = "debug" ]; then
            RUST_LOG_VALUE="info"
          else
            RUST_LOG_VALUE="warn"
          fi

          {
            echo "log_level=$LOG_LEVEL"
            echo "rust_log=$RUST_LOG_VALUE"
          } >> "$GITHUB_OUTPUT"

          echo "::notice::AI Review log level: $LOG_LEVEL (RUST_LOG=$RUST_LOG_VALUE)"

      - name: Context summary (pre-Codex diagnostic)
        env:
          LOG_LEVEL: ${{ steps.log-config.outputs.log_level }}
          MODEL: ${{ inputs.model || vars.CODEX_MODEL || 'gpt-5.4' }}
          INPUT_MODEL: ${{ inputs.model }}
          VAR_MODEL: ${{ vars.CODEX_MODEL }}
          INPUT_RESPONSES_ENDPOINT: ${{ inputs.responses_endpoint }}
          VAR_RESPONSES_ENDPOINT: ${{ vars.CUSTOM_AI_RESPONSES_ENDPOINT }}
          SECRET_RESPONSES_ENDPOINT: ${{ secrets.CUSTOM_AI_RESPONSES_ENDPOINT }}
          EFFORT: ${{ inputs.effort || vars.CODEX_EFFORT || 'xhigh' }}
          CODEX_ARGS: ${{ vars.CODEX_ARGS }}
        run: |
          set -euo pipefail
          CONTEXT_SIZE="$(du -sh .ai-review-context/ 2>/dev/null | awk '{print $1}' || echo 'missing')"
          CONTEXT_FILES="$(find .ai-review-context -type f 2>/dev/null | wc -l | tr -d ' ')"
          if [ -n "${INPUT_MODEL:-}" ]; then
            MODEL_SOURCE="workflow_dispatch input"
          elif [ -n "${VAR_MODEL:-}" ]; then
            MODEL_SOURCE="environment variable"
          else
            MODEL_SOURCE="workflow default"
          fi
          if [ -n "${INPUT_RESPONSES_ENDPOINT:-}" ]; then
            RESPONSES_ENDPOINT_STATUS="configured (workflow_dispatch input)"
          elif [ -n "${VAR_RESPONSES_ENDPOINT:-}" ]; then
            RESPONSES_ENDPOINT_STATUS="configured (environment variable)"
          elif [ -n "${SECRET_RESPONSES_ENDPOINT:-}" ]; then
            RESPONSES_ENDPOINT_STATUS="configured (secret)"
          else
            RESPONSES_ENDPOINT_STATUS="action default"
          fi
          if [ -n "${CODEX_ARGS:-}" ]; then
            CODEX_ARGS_STATUS="configured"
          else
            CODEX_ARGS_STATUS="unset"
          fi

          {
            echo "## AI Review 配置摘要"
            echo
            echo "| 字段 | 值 |"
            echo "|---|---|"
            echo "| Log level | \`$LOG_LEVEL\` |"
            echo "| Model | \`$MODEL\` |"
            echo "| Model source | \`$MODEL_SOURCE\` |"
            echo "| Effort | \`$EFFORT\` |"
            echo "| Responses endpoint | \`$RESPONSES_ENDPOINT_STATUS\` |"
            echo "| Codex args | \`$CODEX_ARGS_STATUS\` |"
            echo "| Sandbox | \`read-only\` |"
            echo "| Context size | \`$CONTEXT_SIZE\` |"
            echo "| Context files | \`$CONTEXT_FILES\` |"
            echo
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$LOG_LEVEL" = "debug" ]; then
            echo "::group::Context files"
            echo "=== Context directory size ==="
            du -sh .ai-review-context/ 2>/dev/null || echo "(missing)"
            echo ""
            echo "=== File listing ==="
            find .ai-review-context -type f -exec ls -lh {} \; 2>/dev/null | sort -k5 -h
            echo ""
            echo "=== Markdown file line counts ==="
            wc -l .ai-review-context/*.md 2>/dev/null || true
            echo ""
            echo "=== Workflow log sizes ==="
            ls -lh .ai-review-context/workflow-*.log 2>/dev/null || echo "(none)"
            echo "::endgroup::"
          elif [ "$LOG_LEVEL" = "normal" ]; then
            echo "AI Review context: $CONTEXT_FILES files, $CONTEXT_SIZE"
          else
            echo "AI Review context summary written to job summary."
          fi
          echo "Codex start: $(date -u +%Y-%m-%dT%H:%M:%SZ)"

      - name: Validate AI secrets
        env:
          CUSTOM_AI_API_KEY: ${{ secrets.CUSTOM_AI_API_KEY }}
          CUSTOM_AI_RESPONSES_ENDPOINT: ${{ inputs.responses_endpoint || vars.CUSTOM_AI_RESPONSES_ENDPOINT || secrets.CUSTOM_AI_RESPONSES_ENDPOINT }}
          LOG_LEVEL: ${{ steps.log-config.outputs.log_level }}
        run: |
          set -euo pipefail
          if [ -z "${CUSTOM_AI_API_KEY:-}" ]; then
            echo "::error::CUSTOM_AI_API_KEY is empty"
            exit 1
          fi
          if [ -n "${CUSTOM_AI_RESPONSES_ENDPOINT:-}" ]; then
            RESPONSES_ENDPOINT_STATUS="present"
          else
            RESPONSES_ENDPOINT_STATUS="action default"
          fi

          {
            echo "## AI Review 凭据校验"
            echo
            echo "- CUSTOM_AI_API_KEY: present"
            echo "- Responses endpoint: $RESPONSES_ENDPOINT_STATUS"
            echo
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$LOG_LEVEL" = "debug" ]; then
            echo "CUSTOM_AI_API_KEY length: ${#CUSTOM_AI_API_KEY}"
            if [ -n "${CUSTOM_AI_RESPONSES_ENDPOINT:-}" ]; then
              echo "CUSTOM_AI_RESPONSES_ENDPOINT length: ${#CUSTOM_AI_RESPONSES_ENDPOINT}"
            else
              echo "CUSTOM_AI_RESPONSES_ENDPOINT: action default"
            fi
          else
            echo "AI secrets are present. Enable log_level=debug to print non-sensitive lengths."
          fi

      - name: Materialize trusted review prompt
        env:
          TRUSTED_PROMPT_SHA: ${{ needs.resolve-pr.outputs.base_sha }}
        run: |
          set -euo pipefail
          mkdir -p .ai-review-context
          git fetch --no-tags --depth=1 origin "$TRUSTED_PROMPT_SHA"
          git show "$TRUSTED_PROMPT_SHA:.github/prompts/ai-review.md" > .ai-review-context/trusted-ai-review.md
          test -s .ai-review-context/trusted-ai-review.md

      - name: Run Codex review
        id: run-codex
        env:
          RUST_LOG: ${{ steps.log-config.outputs.rust_log }}
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.CUSTOM_AI_API_KEY }}
          responses-api-endpoint: ${{ inputs.responses_endpoint || vars.CUSTOM_AI_RESPONSES_ENDPOINT || secrets.CUSTOM_AI_RESPONSES_ENDPOINT }}
          model: ${{ inputs.model || vars.CODEX_MODEL || 'gpt-5.4' }}
          effort: ${{ inputs.effort || vars.CODEX_EFFORT || 'xhigh' }}
          codex-args: ${{ vars.CODEX_ARGS }}
          sandbox: read-only
          safety-strategy: read-only
          prompt-file: .ai-review-context/trusted-ai-review.md

      - name: Post-Codex diagnostic
        if: always()
        env:
          CODEX_FINAL_MESSAGE: ${{ steps.run-codex.outputs.final-message }}
          LOG_LEVEL: ${{ steps.log-config.outputs.log_level }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          MSG_LEN=${#CODEX_FINAL_MESSAGE}
          echo "Codex end: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "final-message length: ${MSG_LEN:-0} chars"

          {
            echo "## AI Review 结果摘要"
            echo
            echo "| 字段 | 值 |"
            echo "|---|---|"
            echo "| Codex output length | \`${MSG_LEN:-0}\` chars |"
            echo "| Workflow | [run]($RUN_URL) |"
            echo
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$MSG_LEN" -gt 0 ] 2>/dev/null; then
            if [ "$LOG_LEVEL" = "debug" ]; then
              echo "::group::Codex output preview"
              echo "${CODEX_FINAL_MESSAGE:0:200}..."
              echo "::endgroup::"
            fi
          else
            echo "::warning::No output from Codex (empty final-message)"
          fi

      - name: Check review length
        id: review-length
        env:
          CODEX_FINAL_MESSAGE: ${{ steps.run-codex.outputs.final-message }}
        run: |
          node <<'NODE'
          const fs = require('fs');
          const raw = process.env.CODEX_FINAL_MESSAGE || '';
          const maxLen = 45000;
          const tooLong = raw.length > maxLen;

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `too_long=${tooLong ? 'true' : 'false'}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `length=${raw.length}\n`);

          fs.appendFileSync(
            process.env.GITHUB_STEP_SUMMARY,
            [
              '## AI Review 长度检查',
              '',
              '| 字段 | 值 |',
              '|---|---|',
              `| Raw review length | \`${raw.length}\` chars |`,
              `| Needs condense | \`${tooLong}\` |`,
              '',
            ].join('\n')
          );

          if (!tooLong) {
            process.exit(0);
          }

          const prompt = [
            '你刚刚生成的 GitHub PR 评审评论过长，不能直接发布。',
            '',
            '请在不新增事实、不改变结论的前提下，把下面的评审压缩成一条可发布的 GitHub PR comment。',
            '',
            '压缩要求：',
            '- 最终内容必须少于 45,000 个字符。',
            '- 保留总体结论、阻塞问题、高风险问题和必要的修复建议。',
            '- 合并重复问题，删除冗长背景、过程说明和低价值措辞。',
            '- 如果没有阻塞问题，保持这个结论清晰。',
            '- 可以保留关键 GitHub suggestion 代码块，但删除非关键的大段代码。',
            '- 不要添加原评审中没有的新问题。',
            '',
            '原评审如下：',
            '----',
            raw,
          ].join('\n');

          fs.writeFileSync('.codex-review-condense-prompt.md', prompt);
          NODE

      - name: Condense long Codex review
        id: condense-codex
        if: steps.review-length.outputs.too_long == 'true'
        env:
          RUST_LOG: ${{ steps.log-config.outputs.rust_log }}
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.CUSTOM_AI_API_KEY }}
          responses-api-endpoint: ${{ inputs.responses_endpoint || vars.CUSTOM_AI_RESPONSES_ENDPOINT || secrets.CUSTOM_AI_RESPONSES_ENDPOINT }}
          model: ${{ inputs.model || vars.CODEX_MODEL || 'gpt-5.4' }}
          effort: ${{ inputs.effort || vars.CODEX_EFFORT || 'xhigh' }}
          codex-args: ${{ vars.CODEX_ARGS }}
          sandbox: read-only
          safety-strategy: read-only
          prompt-file: .codex-review-condense-prompt.md

      - name: Prepare final review comment
        id: prepare-comment
        env:
          RAW_REVIEW: ${{ steps.run-codex.outputs.final-message }}
          CONDENSED_REVIEW: ${{ steps.condense-codex.outputs.final-message }}
          WAS_CONDENSED: ${{ steps.review-length.outputs.too_long }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          node <<'NODE'
          const fs = require('fs');
          const raw = process.env.RAW_REVIEW || '';
          const condensed = process.env.CONDENSED_REVIEW || '';
          const wasCondensed = process.env.WAS_CONDENSED === 'true';
          const hardMax = 60000;

          let finalMessage = wasCondensed && condensed.trim() ? condensed : raw;

          // Fallback: if Codex returned empty output, post a diagnostic message
          if (!finalMessage.trim()) {
            finalMessage = [
              '⚠️ AI 评审未产生输出。',
              '',
              '可能原因：',
              '- AI API 服务暂时不可用（超时/502/522）',
              '- PR 变更过大导致 token 超限',
              '- 网络问题',
              '',
              `请查看 [workflow 日志](${process.env.RUN_URL}) 中的 Post-Codex diagnostic 步骤了解详情。`,
              '',
              '可尝试重新运行此 workflow 或使用 workflow_dispatch 手动触发。',
            ].join('\n');
          }

          if (finalMessage.length > hardMax) {
            const note = '\n\n_压缩后的评审仍超过 GitHub comment 安全长度，已保留前半部分。请手动重新运行并选择较低范围的评审。_';
            finalMessage = finalMessage.slice(0, hardMax - note.length) + note;
          }

          fs.appendFileSync(
            process.env.GITHUB_STEP_SUMMARY,
            [
              '## AI Review 评论准备',
              '',
              '| 字段 | 值 |',
              '|---|---|',
              `| Was condensed | \`${wasCondensed}\` |`,
              `| Final comment length | \`${finalMessage.length}\` chars |`,
              '',
            ].join('\n')
          );

          fs.mkdirSync('.ai-review-context', { recursive: true });
          fs.writeFileSync('.ai-review-context/final-review-comment.md', finalMessage);
          NODE

      - name: Upload final review comment
        uses: actions/upload-artifact@v4
        with:
          name: ai-review-final-comment-${{ needs.resolve-pr.outputs.pr_number }}
          path: .ai-review-context/final-review-comment.md
          if-no-files-found: error
          retention-days: 3
          include-hidden-files: true

  post-review-comment:
    name: 发布评审评论
    runs-on: ubuntu-latest
    needs: [resolve-pr, codex-review]
    timeout-minutes: 5
    if: needs.resolve-pr.outputs.should_review == 'true' && needs.codex-review.result == 'success'

    permissions:
      contents: read
      actions: read
      issues: write
      pull-requests: write

    steps:
      - name: Download final review comment
        uses: actions/download-artifact@v4
        with:
          name: ai-review-final-comment-${{ needs.resolve-pr.outputs.pr_number }}
          path: .ai-review-comment

      - name: Create or update sticky PR comment
        uses: actions/github-script@v7
        env:
          COMMENT_FILE: .ai-review-comment/final-review-comment.md
          PR_NUMBER: ${{ needs.resolve-pr.outputs.pr_number }}
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('fs');
            const marker = '<!-- codex-ai-pr-review -->';
            const prNumber = Number.parseInt(process.env.PR_NUMBER, 10);
            const raw = fs.readFileSync(process.env.COMMENT_FILE, 'utf8');
            const body = [
              marker,
              '## AI PR Review',
              '',
              '> **Read-only**: AI 只阅读 PR diff、checks/logs 和本地检查结果，不执行代码、不修改文件。',
              '',
              raw,
              '',
              '> 想让 AI 修复这些问题？由仓库 OWNER 回复 `/ai-do [指令]`，默认会创建修复 PR；仅在明确需要时使用 `/ai-do --mode=direct [指令]`。',
              '',
              `Workflow: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            ].join('\n');

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            });

            const previous = comments.find((comment) =>
              comment.body && comment.body.includes(marker)
            );

            if (previous) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: previous.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
