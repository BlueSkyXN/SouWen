[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "souwen"
version = "0.1.0"
description = "面向 AI Agent 的学术论文 + 专利信息统一获取工具库"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.10"
authors = [{name = "SouWen Contributors"}]
dependencies = [
    "httpx>=0.27.0",
    "pydantic>=2.0",
    "tenacity>=8.0",
    "python-dotenv>=1.0",
    "rich>=13.0",
    "lxml>=5.0",
    "beautifulsoup4>=4.12",
    "defusedxml>=0.7.0",
]

[project.optional-dependencies]
scraper = ["playwright>=1.40"]
dev = ["pytest>=8.0", "pytest-asyncio>=0.23", "pytest-httpx>=0.30", "ruff>=0.4"]

[tool.hatch.build.targets.wheel]
packages = ["src/souwen"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
