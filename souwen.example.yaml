# SouWen 配置文件示例
# 复制为 souwen.yaml 并填入实际值即可使用
# 也可放置于 ~/.config/souwen/config.yaml 作为全局配置
#
# 优先级：环境变量 > ./souwen.yaml > ~/.config/souwen/config.yaml > .env > 默认值

# ===== 论文数据源 =====
paper:
  # OpenAlex —— 免费，填写邮箱可获得更高速率
  openalex_email: ~
  # Semantic Scholar API Key（申请地址：https://www.semanticscholar.org/product/api）
  semantic_scholar_api_key: ~
  # CORE API Key（申请地址：https://core.ac.uk/services/api）
  core_api_key: ~
  # PubMed / NCBI API Key
  pubmed_api_key: ~
  # Unpaywall —— 免费，填写邮箱即可
  unpaywall_email: ~
  # IEEE Xplore API Key
  ieee_api_key: ~

# ===== 专利数据源 =====
patent:
  # USPTO（美国专利商标局）API Key
  uspto_api_key: ~
  # EPO Open Patent Services 消费者密钥
  epo_consumer_key: ~
  epo_consumer_secret: ~
  # CNIPA（中国国家知识产权局）客户端凭证
  cnipa_client_id: ~
  cnipa_client_secret: ~
  # The Lens API Token
  lens_api_token: ~
  # PatSnap API Key
  patsnap_api_key: ~

# ===== 常规搜索 =====
web:
  # 爬虫引擎 (DuckDuckGo/Yahoo/Brave/Google/Bing/Startpage/Baidu/Mojeek/Yandex) 无需 Key
  # SearXNG 自建实例 URL（例如 http://localhost:8080）
  searxng_url: ~
  # Tavily AI 搜索 API Key（https://app.tavily.com/）
  tavily_api_key: ~
  # Exa 语义搜索 API Key（https://exa.ai/）
  exa_api_key: ~
  # Serper（Google SERP）API Key（https://serper.dev/）
  serper_api_key: ~
  # Brave Search 官方 API Key（https://brave.com/search/api/）
  brave_api_key: ~
  # SerpAPI 多引擎 SERP API Key（https://serpapi.com/）
  serpapi_api_key: ~
  # Firecrawl 搜索+爬取 API Key（https://www.firecrawl.dev/）
  firecrawl_api_key: ~
  # Perplexity Sonar AI 搜索 API Key（https://docs.perplexity.ai/）
  perplexity_api_key: ~
  # Linkup 实时搜索 API Key（https://www.linkup.so/）
  linkup_api_key: ~
  # ScrapingDog SERP API Key（https://www.scrapingdog.com/）
  scrapingdog_api_key: ~
  # Whoogle 自建实例 URL（https://github.com/benbusby/whoogle-search）
  whoogle_url: ~
  # Websurfx 自建实例 URL（https://github.com/neon-mmd/websurfx）
  websurfx_url: ~

# ===== 通用设置 =====
general:
  # HTTP 代理地址（例如 http://127.0.0.1:7890）
  proxy: ~
  # 代理池：多个代理地址，每次请求随机选取（优先于 proxy）
  # 环境变量：SOUWEN_PROXY_POOL=http://p1:7890,http://p2:7890,socks5://p3:1080
  # proxy_pool:
  #   - http://proxy1:7890
  #   - http://proxy2:7890
  #   - socks5://proxy3:1080
  proxy_pool: []
  # 请求超时时间（秒）
  timeout: 30
  # 最大重试次数
  max_retries: 3
  # 数据存储目录
  data_dir: ~/.local/share/souwen
  # 全局默认 HTTP 后端：auto（自动选择）| curl_cffi（TLS 指纹伪装）| httpx（标准 HTTP）
  # auto = 爬虫源优先 curl_cffi，API 源使用 httpx
  default_http_backend: auto
  # 按源单独覆盖 HTTP 后端（仅对爬虫源 BaseScraper 生效）
  # 环境变量：SOUWEN_HTTP_BACKEND='{"duckduckgo":"httpx","google_patents":"curl_cffi"}'
  # http_backend:
  #   duckduckgo: curl_cffi
  #   google_patents: curl_cffi
  #   bing: httpx
  http_backend: {}

# ===== 服务 =====
server:
  # API 访问密码（设置后所有搜索端点需 Authorization: Bearer <password> 认证）
  api_password: ~

# ===== WARP 代理 =====
# 内嵌 Cloudflare WARP 代理（Docker 部署专用）
# 支持 wireproxy (用户态, 全平台) 和 kernel (内核 WireGuard, 高性能)
# 也可通过环境变量 WARP_ENABLED / WARP_MODE / WARP_SOCKS_PORT / WARP_ENDPOINT 控制
warp:
  # 是否启用 WARP (默认关闭)
  warp_enabled: false
  # 模式: auto (自动检测) | wireproxy (用户态) | kernel (需 NET_ADMIN)
  warp_mode: auto
  # SOCKS5 代理监听端口
  warp_socks_port: 1080
  # 自定义 WARP Endpoint (规避 QoS, 如 162.159.192.1:4500)
  warp_endpoint: ~
