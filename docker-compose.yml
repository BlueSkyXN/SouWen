services:
  souwen:
    build: .
    ports:
      - "${PORT:-49265}:49265"
    env_file:
      - path: .env
        required: false
    volumes:
      - souwen-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:49265/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  souwen-data:
